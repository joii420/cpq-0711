# ===========================================
# CPQ Application Configuration
# ===========================================

# --- HTTP ---
quarkus.http.host=0.0.0.0
quarkus.http.port=8081
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-allow-credentials=true
# (2026-05-09) 解决 V5 增强导入向导 HTTP 413: 上传 Excel + resolutions JSON 累计 body 可能超 1M;
# 放宽到 100M 单次请求, 同步放宽 form attribute 上限, 避免 multipart 子字段超限.
quarkus.http.limits.max-body-size=100M
quarkus.http.limits.max-form-attribute-size=10M

# --- Datasource (primary) ---
# Defaults preserve local dev behavior; override in Docker via env vars (DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD).
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:joii5231}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:10.177.152.12}:${DB_PORT:5432}/${DB_NAME:cpq_db}
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.acquisition-timeout=30
# 防御性连接校验 — 远程 PG (10.177.152.12) 被中间设备/防火墙静默断 TCP 后,
# 死连接会被 Agroal 借给请求,直到执行 SQL 才报 SQLState 08006 "This connection has been closed".
# 出现过 V6 upload 写 staging 中途 PG 端关连接 → 整个 staging 写入失败. 加 4 项:
quarkus.datasource.jdbc.background-validation-interval=30S
quarkus.datasource.jdbc.idle-validation-timeout=5S
quarkus.datasource.jdbc.validation-query-sql=SELECT 1
quarkus.datasource.jdbc.max-lifetime=10M

# --- Datasource (readonly — separate connection pool for SQL data sources) ---
quarkus.datasource."datasource-readonly".db-kind=postgresql
quarkus.datasource."datasource-readonly".username=${DB_USERNAME:postgres}
quarkus.datasource."datasource-readonly".password=${DB_PASSWORD:joii5231}
quarkus.datasource."datasource-readonly".jdbc.url=jdbc:postgresql://${DB_HOST:10.177.152.12}:${DB_PORT:5432}/${DB_NAME:cpq_db}
quarkus.datasource."datasource-readonly".jdbc.min-size=2
quarkus.datasource."datasource-readonly".jdbc.max-size=10
quarkus.datasource."datasource-readonly".jdbc.acquisition-timeout=30
quarkus.datasource."datasource-readonly".jdbc.background-validation-interval=30S
quarkus.datasource."datasource-readonly".jdbc.idle-validation-timeout=5S
quarkus.datasource."datasource-readonly".jdbc.validation-query-sql=SELECT 1
quarkus.datasource."datasource-readonly".jdbc.max-lifetime=10M

# --- Hibernate ORM ---
quarkus.hibernate-orm.database.generation=none
# Quarkus 3.34+ 新增校验: 使用 @JdbcTypeCode(SqlTypes.JSON) 时若检测到 jackson.write-dates-as-timestamps=false
# 会拒绝启动. 设置 ignore 绕过此检查, 保持与现有 ObjectMapper 行为兼容.
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# P1(2026-06-26 perf): 开 JDBC 语句批处理 —— saveDraft 全删全建逐行 persist(基准单 693 条 component_data
#   + 工序 + 行实体 ≈ 770 条 INSERT),原本每条 flush 各发一次远程库往返(RTT ~12ms × 770 ≈ 9-10s = S1 主成本)。
#   开 batch-size 后 Hibernate 把同实体多条 INSERT 合并成一条多行 prepared statement,往返 770 → 个位数。
#   order-inserts/updates 让同类语句相邻、不被异类打断批(SIMPLE 单主循环纯 persist 批得满;COMPOSITE 单循环内
#   有原生 INSERT 会触发提前 flush、收益打折,但不破正确性)。实体主键为应用生成 UUID(非 IDENTITY),批处理有效。
#   回退:把 statement-batch-size 设回 0 或删除本段即可。等价性见 Golden*/BatchStage1*/Persist* 等价测试。
quarkus.hibernate-orm.jdbc.statement-batch-size=100
quarkus.hibernate-orm.unsupported-properties."hibernate.order_inserts"=true
quarkus.hibernate-orm.unsupported-properties."hibernate.order_updates"=true

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
# (2026-05-13) 多 Agent 并行开发时不同 Agent 可能新增低版本号迁移脚本(如 V162/V163 在 V164+ 已应用后才被发现)
# out-of-order=true 允许 Flyway 按需补打乱序迁移，避免 dev-mode 重启 500
quarkus.flyway.out-of-order=true
# V216 trigger reload (2026-05-22 v1.7 draft)

# --- Flyway: prod profile 覆盖 ---
# 部署到服务器上启动(java -jar quarkus-run.jar 默认走 prod profile)时禁用自动迁移
# (2026-05-27) 服务器侧手工控制迁移节奏，禁止 Quarkus 启动时自动跑 Flyway
# 仅 prod profile 关闭，dev mode (./mvnw quarkus:dev) 仍保持 migrate-at-start=true 自动迁移
# 如需在服务器上一次性应用迁移，临时 env override: QUARKUS_FLYWAY_MIGRATE_AT_START=true
# 也禁用 clean 命令，杜绝服务器侧任何破坏性 Flyway 操作
%prod.quarkus.flyway.migrate-at-start=false
%prod.quarkus.flyway.clean-at-start=false
%prod.quarkus.flyway.clean-disabled=true

# --- Mailer (dev mode: mock) ---
quarkus.mailer.from=noreply@cpq-system.com
quarkus.mailer.mock=true

# --- Scheduler ---
quarkus.scheduler.cron-type=unix
# NOTE: All scheduled tasks assume UTC+8 (Asia/Shanghai).
# Set JVM timezone via: -Duser.timezone=Asia/Shanghai
# (touch 2026-05-09: trigger full Quarkus restart to apply V140 Flyway migration)

# --- Logging ---
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.cpq".level=DEBUG
quarkus.log.category."org.hibernate.SQL".level=WARN

# --- Engine feature flags ---
cpq.engine.drools.enabled=false

# --- Redis (session store) ---
# Override in Docker via REDIS_HOST, REDIS_PORT, REDIS_PASSWORD, REDIS_DB env vars.
quarkus.redis.hosts=redis://:${REDIS_PASSWORD:joii5231}@${REDIS_HOST:10.177.152.12}:${REDIS_PORT:6379}/${REDIS_DB:0}
# 超时调大: Excel 导入等长事务期间,并发 expand-driver / formula-evaluate 请求会同时
# 打到 Redis 做 session 校验;5s 在远程网络抖动时容易超时
quarkus.redis.timeout=30s
# Vert.x Redis 连接池: 默认 max-pool-size=6 / max-pool-waiting=24, 并发场景易耗尽
quarkus.redis.max-pool-size=32
quarkus.redis.max-pool-waiting=256

# --- Session ---
# Sessions are managed by SessionHelper using Redis (cpq:session:{sessionId}).
# We do NOT use quarkus-security's built-in session/auth mechanism — those
# config keys are not registered and would log "Unrecognized config key" warnings.

# --- Encryption ---
# CRITICAL: Override in production via CPQ_ENCRYPTION_KEY (must be exactly 32 chars).
cpq.encryption-key=${CPQ_ENCRYPTION_KEY:cpq-dev-encryption-key-32chars!!}

# --- RBAC (custom RoleFilter) ---
cpq.security.rbac.enabled=true

# --- Session TTL (PRD §23 SEC-SESSION-13: 30 分钟空闲超时) ---
cpq.session.ttl-minutes=30

# --- Caffeine cache: system-config ---
quarkus.cache.caffeine."system-config".expire-after-write=60s
quarkus.cache.caffeine."system-config".maximum-size=200
quarkus.cache.caffeine."system-config".metrics-enabled=true

# --- Caffeine cache: datapath (X.3) ---
# AST cache: parsed PathExpression objects, keyed by path string
quarkus.cache.caffeine."datapath-ast".expire-after-write=30m
quarkus.cache.caffeine."datapath-ast".maximum-size=10000
quarkus.cache.caffeine."datapath-ast".metrics-enabled=true
# SQL cache: compiled SqlAndParams objects, keyed by AST.toString()+schemaVersion
quarkus.cache.caffeine."datapath-sql".expire-after-write=30m
quarkus.cache.caffeine."datapath-sql".maximum-size=5000
quarkus.cache.caffeine."datapath-sql".metrics-enabled=true
# Metadata/SchemaContext cache: schema mapping objects, keyed by version string
quarkus.cache.caffeine."datapath-metadata".expire-after-write=10m
quarkus.cache.caffeine."datapath-metadata".maximum-size=200
quarkus.cache.caffeine."datapath-metadata".metrics-enabled=true
