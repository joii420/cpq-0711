# Test configuration — use random port to avoid conflict with running dev server
quarkus.http.test-port=0

# Disable RBAC in tests — tests don't authenticate
cpq.security.rbac.enabled=false

# Flyway: also scan test-specific migration path for afterMigrate callback
quarkus.flyway.locations=classpath:db/migration,classpath:db/test-callbacks

# Redis for session (same as main config)
quarkus.redis.hosts=redis://:joii5231@10.177.152.12:6379/0
quarkus.redis.timeout=5s

# Readonly datasource (same credentials as primary in test/dev)
quarkus.datasource."datasource-readonly".db-kind=postgresql
quarkus.datasource."datasource-readonly".username=${quarkus.datasource.username}
quarkus.datasource."datasource-readonly".password=${quarkus.datasource.password}
quarkus.datasource."datasource-readonly".jdbc.url=${quarkus.datasource.jdbc.url}
quarkus.datasource."datasource-readonly".jdbc.max-size=5
