<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>特征库管理原型 v0.4 — 方案 B 快照复制</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:#f0f2f5; font-size:13px; color:#303133; height:100vh; overflow:hidden; }

.layout { display:flex; height:100vh; }
.sider { width:200px; background:#001529; color:#fff; padding:12px 0; flex-shrink:0; overflow-y:auto; }
.sider .logo { padding:0 16px 16px; font-size:14px; font-weight:600; border-bottom:1px solid #1f2d3d; }
.sider .ver { font-size:11px; color:#a6adb4; padding:8px 16px 0; }
.menu { padding-top:8px; }
.m-item { padding:9px 16px; color:#a6adb4; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:8px; }
.m-item:hover { color:#fff; background:#1f2d3d; }
.m-item.active { background:#1f2d3d; color:#fff; }
.m-sub { padding:6px 16px 6px 32px; font-size:12.5px; color:#a6adb4; cursor:pointer; }
.m-sub.active { color:#1890ff; background:#000c17; border-left:3px solid #1890ff; padding-left:29px; }

.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.crumb { padding:10px 20px; background:#fff; border-bottom:1px solid #e4e7ed; font-size:12.5px; color:#909399; }
.crumb b { color:#303133; font-weight:500; }
.content { flex:1; overflow-y:auto; padding:0 20px 16px; }

.exp-banner { background:linear-gradient(90deg,#e6f7ff,#f0f5ff); border:1px dashed #1890ff; padding:10px 14px; border-radius:6px; font-size:12.5px; color:#0050b3; margin:16px 0 12px; }
.exp-banner b { color:#003a8c; }

.page-card { background:#fff; border-radius:8px; padding:18px 20px; margin-bottom:12px; }
.page-title { font-size:18px; font-weight:600; margin-bottom:14px; }

.toolbar { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
.btn { padding:5px 12px; border:1px solid #dcdfe6; background:#fff; border-radius:4px; cursor:pointer; font-size:12.5px; color:#606266; display:inline-flex; align-items:center; gap:4px; transition:all .2s; }
.btn:hover { color:#409eff; border-color:#c6e2ff; background:#ecf5ff; }
.btn-primary { background:#1890ff; color:#fff; border-color:#1890ff; }
.btn-primary:hover { background:#40a9ff; color:#fff; border-color:#40a9ff; }
.btn-success { background:#52c41a; color:#fff; border-color:#52c41a; }
.btn-success:hover { background:#73d13d; }
.btn-danger { color:#f56c6c; border-color:#fbc4c4; }
.btn-danger:hover { background:#f56c6c; color:#fff; border-color:#f56c6c; }
.btn[disabled] { opacity:.45; cursor:not-allowed; }

.search-input { padding:5px 10px; border:1px solid #dcdfe6; border-radius:4px; font-size:12.5px; min-width:180px; }

.fl-table { width:100%; border-collapse:collapse; font-size:12.5px; }
.fl-table th, .fl-table td { padding:10px 12px; text-align:left; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
.fl-table th { background:#fafafa; color:#606266; font-weight:500; position:sticky; top:0; z-index:1; }
.fl-table tr.row-clickable { cursor:pointer; }
.fl-table tr.row-clickable:hover td { background:#fafdff; }
.fl-table tr.row-expanded td { background:#e6f7ff !important; }
.fl-table code { padding:2px 5px; background:#f0f0f0; border-radius:2px; font-family:Consolas,Monaco,monospace; font-size:11.5px; }
.fl-table .num-cell { color:#1890ff; font-weight:500; }

.status-tag { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px; font-weight:500; }
.status-tag.active { background:#f6ffed; color:#52c41a; border:1px solid #b7eb8f; }
.status-tag.draft { background:#fafafa; color:#909399; border:1px solid #d9d9d9; }
.status-tag.archived { background:#f5f5f5; color:#bfbfbf; border:1px solid #e0e0e0; }

.checkbox { width:16px; height:16px; cursor:pointer; vertical-align:middle; }

/* 群组详情页 */
.detail-header-card { background:linear-gradient(135deg,#fff,#fafbfc); border-radius:8px; padding:16px 20px; margin-bottom:12px; display:flex; align-items:center; gap:14px; }
.detail-header-card .back-btn { padding:6px 12px; }
.detail-title { font-size:17px; font-weight:600; flex:1; }
.detail-meta { font-size:12px; color:#909399; margin-top:3px; }

.detail-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px; }
.detail-stat-card { background:#fff; border:1px solid #e4e7ed; border-radius:8px; padding:10px 14px; }
.detail-stat-card.fields { border-left:3px solid #1890ff; }
.detail-stat-card.values { border-left:3px solid #722ed1; }
.detail-stat-card.refs { border-left:3px solid #fa8c16; }
.detail-stat-card.updated { border-left:3px solid #52c41a; }
.dsc-label { font-size:11.5px; color:#909399; }
.dsc-value { font-size:20px; font-weight:600; color:#303133; margin-top:2px; }
.dsc-sub { font-size:10.5px; color:#909399; margin-top:1px; }

.section-title { font-size:14px; font-weight:600; margin:14px 0 8px; display:flex; align-items:center; gap:6px; }
.section-title .count { font-size:12px; color:#909399; font-weight:normal; }
.section-title .tool { margin-left:auto; display:flex; gap:6px; }

.master-detail { background:#fff; border-radius:8px; overflow:hidden; border:1px solid #e4e7ed; }
.master-detail .panel-label { padding:8px 14px; background:#fafafa; font-size:12px; color:#606266; border-bottom:1px solid #f0f0f0; display:flex; align-items:center; gap:8px; }
.master-detail .panel-label .tag-active { background:#1890ff; color:#fff; padding:1px 8px; border-radius:8px; font-size:10.5px; }
.master-detail .panel-toolbar { padding:8px 14px; border-bottom:1px solid #f0f0f0; display:flex; gap:6px; align-items:center; background:#fcfcfc; }

/* Drawer */
.drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.45); opacity:0; pointer-events:none; transition:opacity .2s; z-index:998; }
.drawer-mask.open { opacity:1; pointer-events:auto; }
.drawer { position:fixed; right:-720px; top:0; bottom:0; width:720px; background:#fff; box-shadow:-4px 0 16px rgba(0,0,0,.15); transition:right .3s; z-index:999; display:flex; flex-direction:column; }
.drawer.open { right:0; }
.drawer.wide { width:960px; right:-960px; }
.drawer.wide.open { right:0; }
.drawer-header { padding:14px 20px; border-bottom:1px solid #e4e7ed; display:flex; align-items:center; gap:10px; }
.drawer-title { font-size:15px; font-weight:600; flex:1; }
.drawer-body { flex:1; overflow-y:auto; padding:16px 20px; }
.drawer-footer { padding:12px 20px; border-top:1px solid #e4e7ed; display:flex; gap:8px; justify-content:flex-end; }
.close-btn { background:transparent; border:none; font-size:18px; cursor:pointer; color:#909399; padding:0 4px; }
.close-btn:hover { color:#f56c6c; }

/* 表单 */
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:12.5px; color:#606266; margin-bottom:5px; }
.form-label .req { color:#f56c6c; margin-left:3px; }
.form-input, .form-select, .form-textarea { width:100%; padding:6px 10px; border:1px solid #dcdfe6; border-radius:4px; font-size:12.5px; font-family:inherit; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:#1890ff; outline:none; }
.form-textarea { min-height:60px; resize:vertical; }
.form-row { display:flex; gap:12px; }
.form-row .form-group { flex:1; }
.form-help { font-size:11px; color:#909399; margin-top:3px; }

/* Toast */
.toast-stack { position:fixed; top:20px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:8px; }
.toast { background:#fff; border:1px solid #b7eb8f; border-left:4px solid #52c41a; padding:10px 14px; border-radius:4px; box-shadow:0 4px 12px rgba(0,0,0,.1); font-size:12.5px; min-width:280px; max-width:420px; animation:slideIn .3s ease; }
.toast.info { border-color:#91caff; border-left-color:#1890ff; }
.toast.warning { border-color:#ffd591; border-left-color:#faad14; }
@keyframes slideIn { from { transform:translateX(120%); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* 标签 */
.dt-tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10.5px; font-weight:500; margin-right:3px; }
.dt-tag.string { background:#e6f7ff; color:#0050b3; }
.dt-tag.number { background:#f9f0ff; color:#531dab; }
.dt-tag.date   { background:#fff7e6; color:#d48806; }
.dt-tag.boolean{ background:#f6ffed; color:#389e0d; }
.am-tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10.5px; font-weight:500; background:#fafafa; color:#606266; border:1px solid #e0e0e0; }
.req-tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10.5px; font-weight:500; }
.req-tag.yes { background:#fff1f0; color:#cf1322; }
.req-tag.no  { background:#fafafa; color:#909399; }
</style>
</head>
<body>

<div class="layout">
  <aside class="sider">
    <div class="logo">CPQ 系统 v3</div>
    <div class="ver">v0.4 · 特征库管理</div>
    <div class="menu">
      <div class="m-item">📊 仪表板</div>

    </div>

</div>

<!-- Drawer 通用容器 -->
<div class="drawer-mask" id="drawerMask" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title" id="drawerTitle">编辑</div>

    <button class="btn-primary btn" onclick="saveDrawer()">✓ 保存</button>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
// ============================================================

const featureGroups = [

        ]
      },
      {
        id: 15, code: 'INTERFACE', name: '接口规格', sortOrder: 5, dataType: 'STRING', assignMode: 'SELECT',
        isRequired: false, defaultValue: 'STD-CONN', partnoPrefix: '-', partnoSuffix: '',
        values: [
          { id:151, code:'STD-CONN', label:'标准接口', sortOrder:1, partnoInclude:true, isActive:true, refTemplates: 3 },
          { id:152, code:'M6-CONN',  label:'M6 接口', sortOrder:2, partnoInclude:true, isActive:true, refTemplates: 1 },
          { id:153, code:'M8-CONN',  label:'M8 接口', sortOrder:3, partnoInclude:true, isActive:true, refTemplates: 1 },
        ]
      },
    ]
  },
  {
    id: 2, code: 'FG-CTC-02', name: '接触簧片特征群组', category: '接触簧片',
    description: '弹簧加压式接触片产品的特征字段（含弹簧压力字段）', status: 'ACTIVE',
    updatedBy: '李工', updatedAt: '2026-05-15', refTemplates: 1, fields: []
  },
  {
    id: 3, code: 'FG-TERM-01', name: '端子特征群组', category: '端子',
    description: '汽车端子产品的标准特征', status: 'DRAFT',
    updatedBy: '王工', updatedAt: '2026-05-22', refTemplates: 0, fields: []
  },
  {
    id: 4, code: 'FG-OLD-01', name: '历史接触片（已归档）', category: '接触片',
    description: '2025 年版接触片特征，已被 FG-CTC-01 取代', status: 'ARCHIVED',
    updatedBy: '张工', updatedAt: '2025-12-30', refTemplates: 0, fields: []
  },
];

// 状态
let currentView = 'list';        // 'list' | 'detail'
let currentGroupId = null;
let currentFieldId = null;       // Master-Detail 当前展开的 field
let drawerMode = null;           // 'group' | 'field' | 'value'
let drawerContext = {};

// ============================================================
// 渲染入口
// ============================================================
function render() {
  if (currentView === 'list') renderListView();
  else renderDetailView();
}

// ============================================================
// 列表视图
// ============================================================
function renderListView() {
  document.getElementById('crumb').innerHTML = '系统设置 / <b>特征库管理</b>';
  const html = `
    <div class="exp-banner">
      <b>🧪 实验性 v0.4 · 特征库管理（方案 B 快照复制）</b> — 主数据中心，定义可复用的产品特征字段集合。模板加载时复制成快照写入选配模板，外部改动不影响已发布模板（详见 <code>3D产品选配方案.md §18A</code>）。
    </div>

    <div class="page-card">
      <div class="page-title">特征群组列表</div>
      <div class="toolbar">
        <button class="btn-primary btn" onclick="openCreateGroup()">＋ 新建群组</button>
        <button class="btn" onclick="showToast('info','复制现有群组为新群组')">📋 复制</button>
        <button class="btn" onclick="showToast('info','导入 ERP imsbX 数据')">📥 从 ERP 导入</button>
        <button class="btn" onclick="showToast('info','导出选中群组 JSON')">📤 导出</button>
        <button class="btn btn-danger" disabled title="选中至少一行后启用">🗑 归档</button>
        <div style="flex:1"></div>
        <input class="search-input" placeholder="🔎 编号 / 名称 / 品类..." />
        <select class="search-input" style="min-width:130px;">
          <option>全部品类</option>
          <option>接触片</option>
          <option>接触簧片</option>
          <option>端子</option>
        </select>
        <select class="search-input" style="min-width:120px;">
          <option>全部状态</option>
          <option>ACTIVE</option>
          <option>DRAFT</option>
          <option>ARCHIVED</option>
        </select>
      </div>

      <table class="fl-table">
        <thead>
          <tr>
            <th style="width:36px;"><input type="checkbox" class="checkbox" /></th>
            <th>群组编号</th>
            <th>名称</th>
            <th>品类</th>
            <th style="width:60px;text-align:center;">字段</th>
            <th style="width:60px;text-align:center;">取值</th>
            <th style="width:90px;text-align:center;" title="被多少个选配模板引用">引用模板</th>
            <th style="width:90px;">状态</th>
            <th style="width:130px;">最后更新</th>
            <th style="width:160px;">操作</th>
          </tr>
        </thead>
        <tbody>
          ${featureGroups.map(g => `
            <tr class="row-clickable" onclick="openGroupDetail(${g.id})">
              <td onclick="event.stopPropagation();"><input type="checkbox" class="checkbox" /></td>
              <td><code>${g.code}</code></td>
              <td>${g.name}<div style="font-size:11px;color:#909399;margin-top:2px;">${g.description||''}</div></td>
              <td>${g.category}</td>
              <td style="text-align:center;" class="num-cell">${g.fields.length || '—'}</td>
              <td style="text-align:center;" class="num-cell">${g.fields.reduce((s,f)=>s+f.values.length,0) || '—'}</td>
              <td style="text-align:center;" class="num-cell">${g.refTemplates > 0 ? `<a onclick="event.stopPropagation();showToast('info','跳转 v0.4-3D选配模板管理端原型.html?source_feature_group='+'${g.code}'+' 自动筛选引用本群组的所有模板');" style="color:#1890ff;cursor:pointer;text-decoration:underline;">${g.refTemplates}</a>` : g.refTemplates}</td>

              <td>${g.updatedAt}<div style="font-size:11px;color:#909399;">${g.updatedBy}</div></td>
              <td onclick="event.stopPropagation();">

                <button class="btn" onclick="openEditGroup(${g.id})">✏️ 编辑</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>

}

// ============================================================
// 群组详情视图（Master-Detail：字段表 / 取值表）
// ============================================================
function openGroupDetail(groupId) {
  currentGroupId = groupId;
  const group = featureGroups.find(g => g.id === groupId);
  currentFieldId = group.fields.length > 0 ? group.fields[0].id : null;
  currentView = 'detail';
  render();
}

function backToList() {
  currentView = 'list';
  currentGroupId = null;
  currentFieldId = null;
  render();
}

function renderDetailView() {
  const group = featureGroups.find(g => g.id === currentGroupId);
  if (!group) return backToList();
  document.getElementById('crumb').innerHTML = `系统设置 / 特征库管理 / <b>${group.code}</b>`;

  const totalValues = group.fields.reduce((s,f)=>s+f.values.length, 0);
  const currentField = group.fields.find(f => f.id === currentFieldId);

  const html = `
    <div class="detail-header-card">
      <button class="btn back-btn" onclick="backToList()">← 返回列表</button>
      <div style="flex:1;">
        <div class="detail-title">📚 ${group.name} <code style="font-size:13px;margin-left:8px;">${group.code}</code></div>
        <div class="detail-meta">${group.description} · 品类 <b>${group.category}</b> · <span class="status-tag ${group.status.toLowerCase()}">${group.status}</span></div>
      </div>
      <button class="btn" onclick="openEditGroup(${group.id})">✏️ 编辑群组</button>
      <button class="btn" onclick="showToast('info','导出群组 JSON / DDL')">📤 导出</button>
      <button class="btn btn-danger" onclick="showToast('warning','归档群组 — 已加载的模板快照不受影响')">🗄 归档</button>
    </div>

    <div class="detail-stats">
      <div class="detail-stat-card fields">
        <div class="dsc-label">字段数</div>
        <div class="dsc-value">${group.fields.length}</div>
        <div class="dsc-sub">必填 ${group.fields.filter(f=>f.isRequired).length} · 可选 ${group.fields.filter(f=>!f.isRequired).length}</div>
      </div>
      <div class="detail-stat-card values">
        <div class="dsc-label">取值总数</div>
        <div class="dsc-value">${totalValues}</div>
        <div class="dsc-sub">${group.fields.filter(f=>f.values.length>0).length} 个字段有枚举值</div>
      </div>
      <div class="detail-stat-card refs">
        <div class="dsc-label">引用模板数</div>
        <div class="dsc-value">${group.refTemplates}</div>
        <div class="dsc-sub">快照复制，模板独立</div>
      </div>
      <div class="detail-stat-card updated">
        <div class="dsc-label">最后更新</div>
        <div class="dsc-value" style="font-size:14px;">${group.updatedAt}</div>
        <div class="dsc-sub">by ${group.updatedBy}</div>
      </div>
    </div>

    <!-- 字段列表（Master） -->
    <div class="master-detail" style="margin-bottom:14px;">
      <div class="panel-label">📋 字段列表 <span style="color:#909399;">(${group.fields.length})</span> <span style="margin-left:auto;font-size:11px;color:#909399;">点击行 → 下方显示该字段的取值列表</span></div>
      <div class="panel-toolbar">
        <button class="btn-primary btn" onclick="openCreateField()">＋ 新增字段</button>
        <button class="btn" onclick="showToast('info','批量导入字段（粘贴 CSV 或 ERP 数据）')">📥 批量导入</button>
        <input class="search-input" placeholder="🔎 字段名 / 编号..." style="flex:1;max-width:280px;margin-left:10px;" />
        <select class="search-input" style="min-width:120px;">
          <option>全部类型</option>
          <option>STRING</option>
          <option>NUMBER</option>
          <option>DATE</option>
          <option>BOOLEAN</option>
        </select>
      </div>
      <table class="fl-table">
        <thead>
          <tr>
            <th style="width:36px;"><input type="checkbox" class="checkbox" /></th>
            <th style="width:50px;">项次</th>
            <th>字段编号</th>
            <th>名称</th>
            <th style="width:80px;">类型</th>
            <th style="width:80px;">赋值方式</th>
            <th style="width:60px;text-align:center;">必填</th>
            <th style="width:80px;text-align:center;">取值数</th>
            <th style="width:130px;">默认值 / 范围</th>
            <th style="width:130px;">子料号拼接</th>
            <th style="width:140px;">操作</th>
          </tr>
        </thead>
        <tbody>
          ${group.fields.length === 0 ? `
            <tr><td colspan="11" style="text-align:center;color:#909399;padding:30px;">暂无字段，点击「＋ 新增字段」开始</td></tr>
          ` : group.fields.map(f => `
            <tr class="row-clickable ${f.id===currentFieldId?'row-expanded':''}" onclick="selectField(${f.id})">
              <td onclick="event.stopPropagation();"><input type="checkbox" class="checkbox" /></td>
              <td>${f.sortOrder}</td>
              <td><code>${f.code}</code></td>
              <td>${f.name}</td>
              <td><span class="dt-tag ${f.dataType.toLowerCase()}">${f.dataType}</span></td>
              <td><span class="am-tag">${f.assignMode}</span></td>
              <td style="text-align:center;"><span class="req-tag ${f.isRequired?'yes':'no'}">${f.isRequired?'✓':'—'}</span></td>
              <td style="text-align:center;" class="num-cell">${f.values.length || '—'}</td>
              <td>
                ${f.defaultValue ? `默认 <code>${f.defaultValue}</code><br>` : ''}
                ${(f.minValue||f.maxValue) ? `<span style="font-size:11px;color:#909399;">范围 ${f.minValue||'-∞'} ~ ${f.maxValue||'+∞'}</span>`:''}
              </td>
              <td>
                ${(f.partnoPrefix||f.partnoSuffix) ?
                  `<code style="font-size:10.5px;">${f.partnoPrefix||''}[值]${f.partnoSuffix||''}</code>` :
                  '<span style="color:#bfbfbf;">不参与</span>'}
              </td>
              <td onclick="event.stopPropagation();">
                <button class="btn" onclick="openEditField(${f.id})">✏️</button>
                <button class="btn" onclick="showToast('info','复制字段')">📋</button>
                <button class="btn btn-danger" onclick="showToast('warning','删除字段 ${f.code} — 检查模板引用')">🗑</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <!-- 取值列表（Detail） -->
    ${currentField ? `
      <div class="master-detail">
        <div class="panel-label">🎯 字段 <span class="tag-active">${currentField.name}</span> 的取值列表 <span style="color:#909399;">(${currentField.values.length})</span></div>
        <div class="panel-toolbar">
          <button class="btn-primary btn" onclick="openCreateValue(${currentField.id})">＋ 新增取值</button>
          <button class="btn" onclick="showToast('info','批量粘贴取值（每行一个）')">📥 批量粘贴</button>
          <button class="btn" onclick="showToast('info','调整排序')">↕️ 排序</button>
          <input class="search-input" placeholder="🔎 取值..." style="flex:1;max-width:280px;margin-left:10px;" />
          ${currentField.assignMode !== 'SELECT' ? `<span style="color:#d48806;font-size:11.5px;">⚠ 当前字段赋值方式为 <code>${currentField.assignMode}</code>，无需维护枚举取值</span>` : ''}
        </div>
        ${currentField.assignMode === 'SELECT' ? `
        <table class="fl-table">
          <thead>
            <tr>
              <th style="width:36px;"><input type="checkbox" class="checkbox" /></th>
              <th style="width:50px;">项序</th>
              <th>取值编号</th>
              <th>显示名称</th>
              <th style="width:90px;text-align:center;">参与拼接</th>
              <th style="width:90px;text-align:center;">激活</th>
              <th style="width:100px;text-align:center;">引用模板</th>
              <th style="width:140px;">操作</th>
            </tr>
          </thead>
          <tbody>
            ${currentField.values.length === 0 ? `
              <tr><td colspan="8" style="text-align:center;color:#909399;padding:30px;">暂无取值，点击「＋ 新增取值」开始</td></tr>
            ` : currentField.values.map(v => `
              <tr>
                <td><input type="checkbox" class="checkbox" /></td>
                <td>${v.sortOrder}</td>
                <td><code>${v.code}</code></td>
                <td>${v.label}</td>
                <td style="text-align:center;">${v.partnoInclude ? '<span style="color:#52c41a;">✓</span>' : '<span style="color:#bfbfbf;">—</span>'}</td>
                <td style="text-align:center;">${v.isActive ? '<span class="status-tag active">启用</span>' : '<span class="status-tag archived">停用</span>'}</td>
                <td style="text-align:center;" class="num-cell">${v.refTemplates}</td>
                <td>
                  <button class="btn" onclick="openEditValue(${currentField.id},${v.id})">✏️</button>
                  <button class="btn" onclick="showToast('info','复制取值')">📋</button>
                  <button class="btn btn-danger" onclick="showToast('warning','删除取值 ${v.code}')">🗑</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>` : `<div style="padding:30px;text-align:center;color:#909399;">${currentField.assignMode === 'MANUAL' ? '本字段由用户在选配时手工输入，无需维护枚举值' : '本字段由公式计算得出，配置在「选配模板」的具体使用场景'}</div>`}
      </div>
    ` : `
      <div class="master-detail" style="padding:50px;text-align:center;color:#909399;">
        点击上方字段行 → 在此显示该字段的取值列表
      </div>
    `}
  `;
  document.getElementById('content').innerHTML = html;
}

function selectField(fieldId) {
  currentFieldId = fieldId;
  render();
}

// ============================================================
// Drawer 操作
// ============================================================
function openCreateGroup() {
  drawerMode = 'group-new';
  drawerContext = {};
  document.getElementById('drawerTitle').innerText = '＋ 新建特征群组';
  document.getElementById('drawerBody').innerHTML = renderGroupForm({});
  openDrawer();
}

function openEditGroup(gid) {
  const g = featureGroups.find(x => x.id === gid);
  drawerMode = 'group-edit';
  drawerContext = { id: gid };
  document.getElementById('drawerTitle').innerText = `✏️ 编辑群组：${g.name}`;
  document.getElementById('drawerBody').innerHTML = renderGroupForm(g);
  openDrawer();
}

function renderGroupForm(g) {
  return `
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">群组编号<span class="req">*</span></label>
        <input class="form-input" value="${g.code||''}" placeholder="如 FG-CTC-01" />
        <div class="form-help">对应 ERP imsba01，群组唯一标识</div>
      </div>
      <div class="form-group">
        <label class="form-label">品类<span class="req">*</span></label>
        <select class="form-select">
          <option ${g.category==='接触片'?'selected':''}>接触片</option>
          <option ${g.category==='接触簧片'?'selected':''}>接触簧片</option>
          <option ${g.category==='端子'?'selected':''}>端子</option>
          <option>+ 新增品类</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">名称<span class="req">*</span></label>
      <input class="form-input" value="${g.name||''}" placeholder="如 接触片特征群组" />
    </div>
    <div class="form-group">
      <label class="form-label">描述</label>
      <textarea class="form-textarea" placeholder="群组用途说明...">${g.description||''}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-select">
          <option ${g.status==='DRAFT'?'selected':''}>DRAFT 草稿</option>
          <option ${g.status==='ACTIVE'?'selected':''}>ACTIVE 启用</option>
          <option ${g.status==='ARCHIVED'?'selected':''}>ARCHIVED 归档</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ERP 同步编号</label>
        <input class="form-input" placeholder="留空 = 不同步" />
        <div class="form-help">填写后保存时会双向核对 ERP imsba01</div>
      </div>
    </div>
  `;
}

function openCreateField() {
  drawerMode = 'field-new';
  drawerContext = { groupId: currentGroupId };
  document.getElementById('drawerTitle').innerText = '＋ 新增字段';
  document.getElementById('drawerBody').innerHTML = renderFieldForm({});
  openDrawer();
}

function openEditField(fid) {
  const g = featureGroups.find(x => x.id === currentGroupId);
  const f = g.fields.find(x => x.id === fid);
  drawerMode = 'field-edit';
  drawerContext = { groupId: currentGroupId, fieldId: fid };
  document.getElementById('drawerTitle').innerText = `✏️ 编辑字段：${f.name}`;
  document.getElementById('drawerBody').innerHTML = renderFieldForm(f);
  openDrawer();
}

function renderFieldForm(f) {
  return `
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">字段编号<span class="req">*</span></label>
        <input class="form-input" value="${f.code||''}" placeholder="如 MODEL" />
        <div class="form-help">对应 ERP imsbb 字段；群组内唯一</div>
      </div>
      <div class="form-group">
        <label class="form-label">项次（顺序）</label>
        <input class="form-input" type="number" value="${f.sortOrder||''}" placeholder="1,2,3..." />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">字段名称<span class="req">*</span></label>
      <input class="form-input" value="${f.name||''}" placeholder="如 型号" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">数据类型<span class="req">*</span></label>
        <select class="form-select" id="fldDataType">
          <option value="STRING"  ${f.dataType==='STRING'?'selected':''}>STRING 字符</option>
          <option value="NUMBER"  ${f.dataType==='NUMBER'?'selected':''}>NUMBER 数值</option>
          <option value="DATE"    ${f.dataType==='DATE'?'selected':''}>DATE 日期</option>
          <option value="BOOLEAN" ${f.dataType==='BOOLEAN'?'selected':''}>BOOLEAN 布尔</option>
        </select>
        <div class="form-help">对应 ERP imsbb04 类型 + imsbb06 属性类型合并简化</div>
      </div>
      <div class="form-group">
        <label class="form-label">赋值方式<span class="req">*</span></label>
        <select class="form-select" id="fldAssignMode">
          <option value="MANUAL"   ${f.assignMode==='MANUAL'?'selected':''}>MANUAL 手工输入</option>
          <option value="SELECT"   ${f.assignMode==='SELECT'?'selected':''}>SELECT 枚举选择</option>
          <option value="COMPUTED" ${f.assignMode==='COMPUTED'?'selected':''}>COMPUTED 公式计算</option>
        </select>
        <div class="form-help">SELECT 需在下方维护取值列表</div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">是否必填</label>
        <select class="form-select">
          <option ${f.isRequired?'selected':''}>✓ 必填</option>
          <option ${!f.isRequired?'selected':''}>○ 可选</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">默认值</label>
        <input class="form-input" value="${f.defaultValue||''}" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">最小限制（MANUAL 数值/日期）</label>
        <input class="form-input" value="${f.minValue||''}" placeholder="0.3" />
        <div class="form-help">对应 ERP imsbb10</div>
      </div>
      <div class="form-group">
        <label class="form-label">最大限制</label>
        <input class="form-input" value="${f.maxValue||''}" placeholder="1.0" />
        <div class="form-help">对应 ERP imsbb11</div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">小数位（NUMBER）</label>
        <input class="form-input" type="number" value="${f.decimalPlaces||0}" />
        <div class="form-help">对应 ERP imsbb08</div>
      </div>
      <div class="form-group">
        <label class="form-label">码长（STRING）</label>
        <input class="form-input" type="number" value="${f.codeLength||''}" />
        <div class="form-help">对应 ERP imsbb07</div>
      </div>
    </div>

    <div style="border-top:1px solid #f0f0f0;margin:14px 0 10px;padding-top:10px;">
      <div style="font-size:13px;font-weight:600;color:#303133;margin-bottom:8px;">🔧 子料号拼接（吸收自 ERP imsbb14/15）</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">前缀连接符</label>
        <input class="form-input" value="${f.partnoPrefix||''}" placeholder="如 -T" />
        <div class="form-help">如 厚度字段前缀 <code>-T</code> → 拼出 <code>-T0.5mm</code></div>
      </div>
      <div class="form-group">
        <label class="form-label">后缀连接符</label>
        <input class="form-input" value="${f.partnoSuffix||''}" placeholder="如 mm" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">限定数据源 (data_source_ref)</label>
        <input class="form-input" value="${f.dataSourceRef||''}" placeholder="留空 = 不限定" />
        <div class="form-help">对应 ERP imsbb13，关联 master_data_source.code（v0.2 已存在）</div>
      </div>
    </div>
  `;
}

function openCreateValue(fieldId) {
  drawerMode = 'value-new';
  drawerContext = { fieldId };
  document.getElementById('drawerTitle').innerText = '＋ 新增取值';
  document.getElementById('drawerBody').innerHTML = renderValueForm({});
  openDrawer();
}

function openEditValue(fieldId, valueId) {
  const g = featureGroups.find(x => x.id === currentGroupId);
  const f = g.fields.find(x => x.id === fieldId);
  const v = f.values.find(x => x.id === valueId);
  drawerMode = 'value-edit';
  drawerContext = { fieldId, valueId };
  document.getElementById('drawerTitle').innerText = `✏️ 编辑取值：${v.label}`;
  document.getElementById('drawerBody').innerHTML = renderValueForm(v);
  openDrawer();
}

function renderValueForm(v) {
  return `
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">取值编号<span class="req">*</span></label>
        <input class="form-input" value="${v.code||''}" placeholder="如 STD" />
        <div class="form-help">对应 ERP imsbd04，字段内唯一</div>
      </div>
      <div class="form-group">
        <label class="form-label">项序（排序）</label>
        <input class="form-input" type="number" value="${v.sortOrder||''}" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">显示名称<span class="req">*</span></label>
      <input class="form-input" value="${v.label||''}" placeholder="如 标准款 STD" />
    </div>
    <div class="form-group">
      <label class="form-label">描述</label>
      <textarea class="form-textarea">${v.description||''}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">参与子料号拼接</label>
        <select class="form-select">
          <option ${v.partnoInclude?'selected':''}>✓ 参与（拼接到子料号）</option>
          <option ${!v.partnoInclude?'selected':''}>✗ 不参与</option>
        </select>
        <div class="form-help">对应 ERP imsbd05 拼接否</div>
      </div>
      <div class="form-group">
        <label class="form-label">激活状态</label>
        <select class="form-select">
          <option ${v.isActive?'selected':''}>✓ 启用</option>
          <option ${!v.isActive?'selected':''}>✗ 停用</option>
        </select>
        <div class="form-help">对应 ERP imsbdacti 资料有效码</div>
      </div>
    </div>

    ${v.refTemplates > 0 ? `
      <div style="background:#fffbe6;border:1px solid #ffd591;padding:10px 12px;border-radius:4px;margin-top:10px;font-size:12px;color:#876800;">
        ⚠ 此取值已被 <b>${v.refTemplates}</b> 个选配模板快照复制使用。修改本取值不会影响已生成的模板快照（方案 B 设计）。
      </div>
    ` : ''}
  `;
}

function openDrawer() {
  document.getElementById('drawerMask').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerMask').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  drawerMode = null;
  drawerContext = {};
}

function saveDrawer() {
  showToast('info', `✓ 已保存（mode=${drawerMode}）`);
  closeDrawer();
  render();
}

// ============================================================
// Toast
// ============================================================
function showToast(type, msg) {
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerText = msg;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ============================================================
// 启动
// ============================================================
render();
</script>
</body>
</html>
