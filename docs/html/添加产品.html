
<style>
*{box-sizing:border-box;}
.panel{display:none;flex:1;overflow:hidden;flex-direction:column;}
.panel.active{display:flex;}
.type-card{border:0.5px solid #e0e0e0;border-radius:10px;padding:16px 18px;cursor:pointer;transition:border .15s,background .12s;flex:1;}
.type-card:hover{border-color:#9fa8da;background:#fafafe;}
.type-card.selected{border:1.5px solid #5c6bc0;background:#f0effe;}
.pn-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;cursor:pointer;border:0.5px solid #e8e8e8;margin-bottom:5px;transition:background .12s,border .15s;}
.pn-row:hover{background:#f5f4ff;border-color:#c5cae9;}
.pn-row.selected{background:#f0effe;border:1.5px solid #5c6bc0;}
.pn-none{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:7px;cursor:pointer;border:1.5px dashed #c5cae9;margin-top:8px;color:#5c6bc0;font-size:12px;transition:background .12s;}
.pn-none:hover{background:#f5f4ff;}
.pn-none.selected{background:#f0effe;border-style:solid;}
.mat-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;cursor:pointer;border:0.5px solid transparent;transition:background .12s,border .15s;}
.mat-row:hover{background:#f5f4ff;border-color:#c5cae9;}
.mat-row.selected{background:#f0effe;border:1.5px solid #5c6bc0;}
.elem-row{display:grid;grid-template-columns:56px 1fr 112px;gap:8px;align-items:center;padding:7px 0;border-bottom:0.5px solid #f0f0f0;font-size:12px;}
.elem-row:last-child{border-bottom:none;}
.ei{width:72px;border:0.5px solid #c5cae9;border-radius:5px;padding:4px 6px;font-size:12px;text-align:right;color:#333;outline:none;background:#fff;}
.ei:focus{border-color:#5c6bc0;}
.proc-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border:0.5px solid #e8e8e8;border-radius:7px;font-size:12px;cursor:pointer;margin-bottom:4px;transition:background .12s;}
.proc-item:hover{background:#f5f4ff;}
.proc-item.added{background:#f0effe;border-color:#9fa8da;}
.added-row{display:flex;align-items:center;gap:7px;padding:6px 9px;background:#f8f7ff;border-radius:7px;font-size:12px;margin-bottom:4px;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.btn-primary{font-size:13px;border:none;border-radius:6px;padding:7px 22px;background:#5c6bc0;color:#fff;cursor:pointer;}
.btn-secondary{font-size:13px;border:0.5px solid #bbb;border-radius:6px;padding:7px 22px;background:#fff;color:#555;cursor:pointer;}
.btn-sm{font-size:11px;border:0.5px solid #9fa8da;border-radius:5px;padding:3px 9px;background:#fff;color:#5c6bc0;cursor:pointer;white-space:nowrap;}
.btn-del{font-size:14px;border:none;background:none;color:#bbb;cursor:pointer;line-height:1;padding:0 2px;}
.hi{color:#5c6bc0;font-weight:600;}
.empty{text-align:center;padding:22px 0;color:#ccc;font-size:12px;}
.sum-sec{border:0.5px solid #e0e0e0;border-radius:10px;overflow:hidden;margin-bottom:11px;}
.sum-hd{background:#f5f4ff;padding:8px 16px;font-size:12px;font-weight:500;color:#5c6bc0;}
.sum-bd{padding:11px 16px;}
.part-node{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;border:2px solid #e0e0e0;background:#fff;color:#bbb;flex-shrink:0;cursor:pointer;transition:all .2s;}
.part-node.done{background:#5c6bc0;border-color:#5c6bc0;color:#fff;}
.part-node.active{background:#fff;border-color:#5c6bc0;color:#5c6bc0;box-shadow:0 0 0 3px rgba(92,107,192,.15);}
.sub-dot{width:7px;height:7px;border-radius:50%;background:#e0e0e0;}
.sub-dot.done{background:#5c6bc0;}
.sub-dot.active{background:#5c6bc0;box-shadow:0 0 0 2px rgba(92,107,192,.25);}

/* combo process */
.cproc-card{border:0.5px solid #e0e0e0;border-radius:9px;padding:12px 14px;cursor:pointer;margin-bottom:8px;transition:border .15s,background .12s;}
.cproc-card:hover{border-color:#9fa8da;background:#fafafe;}
.cproc-card.selected{border:1.5px solid #5c6bc0;background:#f0effe;}
.part-chip{display:inline-flex;align-items:center;gap:4px;background:#e8eaf6;color:#5c6bc0;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;}
.added-cproc{border:0.5px solid #c5cae9;border-radius:8px;padding:10px 14px;margin-bottom:8px;background:#f9f8ff;}
.param-field label{display:block;font-size:11px;color:#888;margin-bottom:3px;}
.param-field input,.param-field select{width:100%;padding:5px 8px;font-size:12px;border:0.5px solid #ddd;border-radius:5px;outline:none;color:#333;background:#fff;}
.param-field input:focus,.param-field select:focus{border-color:#5c6bc0;}
</style>

        <button class="btn-primary" id="btnNext" onclick="goNext()">下一步</button>
      </div>
    </div>
  </div>
</div>

  {id:'p7',name:'精密研磨',cat:'精加工',time:'2h'},{id:'p8',name:'质量检测',cat:'检验',time:'1h'},
  {id:'p9',name:'包装入库',cat:'包装',time:'0.5h'},
];
// 组合工艺库 — 需要两个或多个配件参与
const comboProcs=[
  {id:'cp1',name:'铆接',icon:'🔩',desc:'将两个配件通过铆钉压接固定',params:[{id:'pressure',label:'铆接压力 (kN)',type:'number',placeholder:'如 5.0'},{id:'height',label:'铆钉高度 (mm)',type:'number',placeholder:'如 3.2'}]},
  {id:'cp2',name:'电阻焊',icon:'⚡',desc:'通过电阻加热实现配件熔合',params:[{id:'current',label:'焊接电流 (kA)',type:'number',placeholder:'如 8.0'},{id:'time',label:'焊接时间 (ms)',type:'number',placeholder:'如 80'}]},
  {id:'cp3',name:'激光焊',icon:'🔆',desc:'使用激光束对配件进行精密焊接',params:[{id:'power',label:'激光功率 (W)',type:'number',placeholder:'如 200'},{id:'speed',label:'焊接速度 (mm/s)',type:'number',placeholder:'如 50'}]},
  {id:'cp4',name:'钎焊',icon:'🔥',desc:'使用钎料在低于母材熔点下连接配件',params:[{id:'temp',label:'钎焊温度 (°C)',type:'number',placeholder:'如 650'},{id:'material',label:'钎料材质',type:'text',placeholder:'如 银基钎料'}]},
  {id:'cp5',name:'超声波焊接',icon:'〰️',desc:'利用超声波振动将配件熔合',params:[{id:'amplitude',label:'振幅 (μm)',type:'number',placeholder:'如 30'},{id:'weld_time',label:'焊接时间 (ms)',type:'number',placeholder:'如 500'}]},
  {id:'cp6',name:'压配合',icon:'🗜️',desc:'通过过盈配合将配件压入固定',params:[{id:'force',label:'压入力 (kN)',type:'number',placeholder:'如 12'},{id:'fit',label:'配合公差',type:'text',placeholder:'如 H7/r6'}]},
];
const typeInfo={
  locked:{label:'标准锁定',bg:'#fce4ec',color:'#c62828',note:'标准配方，元素含量已锁定'},
  editable:{label:'含量可调',bg:'#e8f5e9',color:'#2e7d32',note:'所有元素含量均可在范围内调整'},
  partial:{label:'部分可调',bg:'#fff8e1',color:'#f57f17',note:'绿色字段可调，灰色字段锁定'},
};

// ── STATE ──
let productType='single';
let initPartCount=2;
let parts=[];   // [{name,pn,useNone,mat,elemVals,matLocked,procs:[]}]
let ci=0;       // current part index
let globalStep=0; // 0=type,1=partConfig,2=comboProc(combo only),3=done
let subStep=0;    // 0=pn,1=mat,2=proc (within partConfig)
// combo processes added
let addedCProcs=[]; // [{cprocId, parts:[0,1], params:{}}]
// working per-part state
let wMat=null,wElem={},wMatLocked=false,wProcs=[];

function newPart(name){return {name,pn:null,useNone:false,mat:null,elemVals:{},matLocked:false,procs:[]};}

// ── HELPERS ──
function hi(str,q){if(!q||!str)return String(str||'');return String(str).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="hi">$1</span>');}
function showPanel(id){['p0','p1','p2','p3','p4','p5'].forEach(p=>{document.getElementById(p).classList.toggle('active',p===id);});}

function saveWS(){const p=parts[ci];p.mat=wMat;p.elemVals=Object.assign({},wElem);p.matLocked=wMatLocked;p.procs=wProcs.slice();}
function loadWS(){const p=parts[ci];wMat=p.mat;wElem=Object.assign({},p.elemVals);wMatLocked=p.matLocked;wProcs=p.procs.slice();if(wMat&&!Object.keys(wElem).length)wMat.elems.forEach(e=>{wElem[e.s]=e.v;});}

// ── TYPE ──
function selectType(t){
  productType=t;
  document.getElementById('tc_single').classList.toggle('selected',t==='single');
  document.getElementById('tc_combo').classList.toggle('selected',t==='combo');
  document.getElementById('comboCountWrap').style.display=t==='combo'?'block':'none';
}
function changePartCount(d){initPartCount=Math.max(2,Math.min(8,initPartCount+d));document.getElementById('partCountDisplay').textContent=initPartCount;}

// ── GLOBAL BAR ──
function renderGlobalBar(){
  const labels=productType==='combo'
    ?['产品类型',`配件选配 ×${parts.length}`,'组合工艺','完成选配']
    :['产品类型','料号匹配','材质选配','工序选择','完成选配'];
  let activeIdx;
  if(productType==='combo'){
    activeIdx=globalStep===0?0:globalStep===1?1:globalStep===2?2:3;
  } else {
    // single: 0→0, subStep maps to 1/2/3, done→4
    activeIdx=globalStep===0?0:globalStep===3?4:subStep+1;
  }
  document.getElementById('globalBar').innerHTML=labels.map((s,i)=>{
    const done=i<activeIdx,active=i===activeIdx;
    const bg=done||active?'#5c6bc0':'#e0e0e0',fc=done||active?'#fff':'#999';
    const tc=active?'#5c6bc0':done?'#888':'#bbb',fw=active?'500':'400';
    return `<span style="width:20px;height:20px;border-radius:50%;background:${bg};color:${fc};display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;">${done?'✓':i+1}</span>
      <span style="margin-left:4px;color:${tc};font-weight:${fw};white-space:nowrap;">${s}</span>
      ${i<labels.length-1?`<div style="flex:1;height:1px;background:${done?'#5c6bc0':'#e0e0e0'};margin:0 5px;min-width:4px;"></div>`:''}`;
  }).join('');
}

// ── PART PROGRESS ──
function renderPartProgress(){
  if(productType!=='combo'){document.getElementById('partProgressWrap').style.display='none';return;}
  document.getElementById('partProgressWrap').style.display='block';
  let html='';
  parts.forEach((p,i)=>{
    const allDone=p.pn!==null||p.useNone;
    const done=i<ci||(i===ci&&subStep===3);
    const active=i===ci&&subStep<3;
    const cls=done?'done':active?'active':'';
    if(i>0)html+=`<div style="flex:1;height:1px;background:${i<=ci?'#5c6bc0':'#e0e0e0'};margin:0 4px;margin-top:-14px;"></div>`;
    html+=`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
      <div class="part-node ${cls}" title="${p.name}">${done?'✓':(i+1)}</div>
      <div style="font-size:10px;color:${active?'#5c6bc0':'#aaa'};font-weight:${active?500:400};white-space:nowrap;max-width:56px;overflow:hidden;text-overflow:ellipsis;text-align:center;">${p.name}</div>
    </div>`;
  });
  document.getElementById('partProgressBar').innerHTML=html;
  // sub steps
  const subs=['料号','材质','工序'];
  let sub=`<span style="color:#aaa;margin-right:6px;white-space:nowrap;">「${parts[ci].name}」：</span>`;
  subs.forEach((s,i)=>{
    if(i>0)sub+=`<div style="width:16px;height:1px;background:${i<=subStep?'#5c6bc0':'#e0e0e0'};"></div>`;
    sub+=`<div class="sub-dot ${i<subStep?'done':i===subStep?'active':''}"></div><span style="margin-left:3px;color:${i===subStep?'#5c6bc0':'#aaa'};font-weight:${i===subStep?500:400};">${i<subStep?'✓ ':''}${s}</span>`;
  });
  document.getElementById('subStepBar').innerHTML=sub;
}

// ── SEARCH ──
function doSearch(q){
  const p=parts[ci];const kw=q.trim().toLowerCase();
  if(!kw){document.getElementById('matchCnt').textContent='—';document.getElementById('pnResults').innerHTML='<div class="empty"><i class="ti ti-search" style="font-size:26px;display:block;margin-bottom:8px;" aria-hidden="true"></i>输入关键词开始搜索</div>';updateNextBtn();return;}
  const res=allPNs.filter(r=>r.pn.toLowerCase().includes(kw)||r.mat.toLowerCase().includes(kw)||r.matName.includes(kw)||r.spec.includes(kw)||r.dim.includes(kw));
  document.getElementById('matchCnt').textContent=res.length||'0';
  let html=res.map(r=>{
    const isSel=!p.useNone&&p.pn&&p.pn.pn===r.pn;
    const sc=r.stock>0?'#2e7d32':'#c62828';
    return `<div class="pn-row ${isSel?'selected':''}" onclick="selectPN('${r.pn}')">
      <div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:500;color:#222;margin-bottom:2px;">${hi(r.pn,kw)}</div>
      <div style="font-size:11px;color:#888;">${hi(r.mat,kw)} ${hi(r.matName,kw)} · ${hi(r.spec,kw)} · ${hi(r.dim,kw)}</div></div>
      <div style="text-align:right;flex-shrink:0;margin-left:8px;">
        <span style="font-size:10px;background:${r.status==='在产'?'#e8f5e9':'#fce4ec'};color:${r.status==='在产'?'#2e7d32':'#c62828'};padding:1px 6px;border-radius:4px;display:block;margin-bottom:2px;">${r.status}</span>
        <span style="font-size:11px;color:${sc};">库存 ${r.stock}</span>
      </div></div>`;
  }).join('')||'<div class="empty"><i class="ti ti-mood-empty" style="font-size:24px;display:block;margin-bottom:6px;" aria-hidden="true"></i>未找到匹配料号</div>';
  html+=`<div class="pn-none ${p.useNone?'selected':''}" onclick="selectNone()"><i class="ti ti-plus-circle" style="font-size:15px;" aria-hidden="true"></i><span>无匹配料号，进入自定义材质选配</span></div>`;
  document.getElementById('pnResults').innerHTML=html;updateNextBtn();
}
function selectPN(pn){const p=parts[ci];p.pn=allPNs.find(r=>r.pn===pn);p.useNone=false;doSearch(document.getElementById('mainSearch').value);updateNextBtn();}
function selectNone(){const p=parts[ci];p.useNone=true;p.pn=null;doSearch(document.getElementById('mainSearch').value);updateNextBtn();}

// ── MAT ──
function initMatStep(){
  const p=parts[ci];
  wMatLocked=!!p.pn;wMat=p.pn?mats.find(m=>m.id===p.pn.matId)||null:(p.mat||null);
  wElem=Object.assign({},p.elemVals);
  if(wMat&&!Object.keys(wElem).length)wMat.elems.forEach(e=>{wElem[e.s]=e.v;});
  document.getElementById('matSearchWrap').style.display=wMatLocked?'none':'block';
  if(document.getElementById('matSearch'))document.getElementById('matSearch').value='';
  filterMat('');
  if(wMat)renderElemDetail();else{document.getElementById('noMatSel').style.display='flex';document.getElementById('elemDetail').style.display='none';}
}
function filterMat(q){
  const kw=q.trim().toLowerCase();
  const list=wMatLocked?[wMat]:mats.filter(m=>m&&(!kw||m.sym.toLowerCase().includes(kw)||m.name.includes(kw)||m.spec.includes(kw)));
  document.getElementById('matList').innerHTML=list.filter(Boolean).map(m=>{
    const ti=typeInfo[m.type],isSel=wMat&&wMat.id===m.id;
    return `<div class="mat-row ${isSel?'selected':''}" onclick="${wMatLocked?'':'selectMat(\''+m.id+'\')'}">
      <div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:500;color:#222;">${hi(m.sym,kw)} <span style="font-weight:400;color:#888;font-size:11px;">${hi(m.name,kw)}</span></div><div style="font-size:11px;color:#aaa;">${hi(m.spec,kw)}</div></div>
      <span class="badge" style="background:${ti.bg};color:${ti.color};">${ti.label}</span></div>`;
  }).join('')||'<div class="empty">无匹配材质</div>';
}
function selectMat(id){if(wMatLocked)return;wMat=mats.find(m=>m.id===id);wElem={};wMat.elems.forEach(e=>{wElem[e.s]=e.v;});filterMat(document.getElementById('matSearch').value||'');renderElemDetail();saveWS();}
function renderElemDetail(){
  if(!wMat){document.getElementById('noMatSel').style.display='flex';document.getElementById('elemDetail').style.display='none';return;}
  document.getElementById('noMatSel').style.display='none';document.getElementById('elemDetail').style.display='flex';
  const ti=typeInfo[wMat.type];
  document.getElementById('eTitle').textContent=wMat.sym+' '+wMat.name;
  document.getElementById('eSub').textContent='配比 '+wMat.spec;
  const b=document.getElementById('eBadge');b.textContent=ti.label;b.style.background=ti.bg;b.style.color=ti.color;
  document.getElementById('eLockBanner').style.display=wMatLocked?'flex':'none';
  document.getElementById('eNote').innerHTML=wMatLocked?'':`<i class="ti ti-info-circle" style="font-size:12px;vertical-align:-1px;margin-right:3px;" aria-hidden="true"></i>${ti.note}`;
  document.getElementById('eRows').innerHTML=wMat.elems.map(e=>{
    const ce=!wMatLocked&&((wMat.type==='editable')||(wMat.type==='partial'&&e.min!==undefined));
    const v=wElem[e.s]??e.v;
    const inp=ce?`<div style="display:flex;align-items:center;gap:3px;justify-content:flex-end;"><input class="ei" type="number" min="${e.min}" max="${e.max}" step="0.1" value="${v}" onchange="setElem('${e.s}',this.value)"/><span style="font-size:11px;color:#888;">%</span></div>`
      :`<div style="font-size:12px;color:#999;text-align:right;">${v}%&nbsp;<i class="ti ti-lock" style="font-size:11px;" aria-hidden="true"></i></div>`;
    const rng=ce?`<span style="font-size:10px;color:#bbb;margin-left:3px;">${e.min}–${e.max}</span>`:'';
    return `<div class="elem-row"><span style="background:#e8eaf6;color:#5c6bc0;font-size:11px;padding:2px 6px;border-radius:4px;font-weight:600;">${e.s}</span><span style="color:#555;">${e.n}${rng}</span>${inp}</div>`;
  }).join('');checkSum();
}
function setElem(s,v){wElem[s]=parseFloat(v)||0;saveWS();checkSum();}
function checkSum(){
  if(!wMat||wMatLocked){document.getElementById('sumWrap').style.display='none';return;}
  const editable=wMat.elems.filter(e=>(wMat.type==='editable')||(wMat.type==='partial'&&e.min!==undefined));
  if(!editable.length){document.getElementById('sumWrap').style.display='none';return;}
  const tot=wMat.elems.reduce((a,e)=>a+(parseFloat(wElem[e.s])||0),0);
  const w=document.getElementById('sumWrap'),d=Math.abs(tot-100);w.style.display='block';
  if(d>0.01){w.style.background=d>5?'#fce4ec':'#fff8e1';w.style.color=d>5?'#c62828':'#f57f17';w.innerHTML=`<i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:3px;" aria-hidden="true"></i>含量之和 ${tot.toFixed(1)}%，建议调整至100%`;}
  else{w.style.background='#e8f5e9';w.style.color='#2e7d32';w.innerHTML=`<i class="ti ti-circle-check" style="font-size:12px;vertical-align:-1px;margin-right:3px;" aria-hidden="true"></i>含量之和100%，配比正确`;}
}

// ── PROC ──
function renderProcStep(){wProcs=parts[ci].procs.slice();renderProcLib(allProcs);renderAddedProcs();}
function renderProcLib(list,q=''){
  document.getElementById('procList').innerHTML=list.map(p=>{
    const ia=wProcs.find(a=>a.id===p.id);
    return `<div class="proc-item ${ia?'added':''}"><div><div style="font-weight:500;margin-bottom:2px;">${hi(p.name,q)}</div>
      <span style="font-size:11px;background:${ia?'#e8eaf6':'#f0f0f0'};color:${ia?'#5c6bc0':'#888'};padding:2px 6px;border-radius:4px;">${p.cat}</span>
      <span style="font-size:11px;color:#bbb;margin-left:5px;">${p.time}</span></div>
      <button class="btn-sm" onclick="toggleProc('${p.id}')">${ia?'已添加':'+ 添加'}</button></div>`;
  }).join('')||'<div class="empty">无匹配工序</div>';
}
function filterProc(q){renderProcLib(allProcs.filter(p=>!q||p.name.includes(q)||p.cat.includes(q)),q);}
function toggleProc(id){
  const idx=wProcs.findIndex(a=>a.id===id);
  if(idx>-1)wProcs.splice(idx,1);else wProcs.push(allProcs.find(p=>p.id===id));
  parts[ci].procs=wProcs.slice();renderProcLib(allProcs);renderAddedProcs();
}
function renderAddedProcs(){
  document.getElementById('procCnt').textContent=wProcs.length;
  document.getElementById('addedProcs').innerHTML=wProcs.length
    ?wProcs.map((p,i)=>`<div class="added-row">
        <span style="width:20px;height:20px;border-radius:50%;background:#e8eaf6;color:#5c6bc0;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</span>
        <span style="flex:1;font-weight:500;">${p.name}</span>
        <span style="font-size:11px;background:#e8eaf6;color:#5c6bc0;padding:2px 6px;border-radius:4px;">${p.cat}</span>
        <button class="btn-del" onclick="toggleProc('${p.id}')" aria-label="移除">✕</button></div>`).join('')
    :`<div class="empty"><i class="ti ti-plus-circle" style="font-size:24px;display:block;margin-bottom:6px;" aria-hidden="true"></i>从左侧添加工序</div>`;
}

// ── COMBO PROC ──
function initComboProcStep(){renderCProcLib(comboProcs);renderAddedCProcs();}
function filterCProc(q){renderCProcLib(comboProcs.filter(p=>!q||p.name.includes(q)||p.desc.includes(q)),q);}
function renderCProcLib(list,q=''){
  document.getElementById('cprocList').innerHTML=list.map(cp=>{
    const ia=addedCProcs.find(a=>a.cprocId===cp.id);
    return `<div class="cproc-card ${ia?'selected':''}">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;">
        <span style="font-size:18px;line-height:1;">${cp.icon}</span>
        <span style="font-size:12px;font-weight:500;color:#222;">${hi(cp.name,q)}</span>
        ${ia?'<span style="font-size:10px;background:#e8f5e9;color:#2e7d32;padding:1px 5px;border-radius:3px;margin-left:auto;">已添加</span>':''}
      </div>
      <div style="font-size:11px;color:#888;margin-bottom:8px;">${cp.desc}</div>
      ${ia?`<button class="btn-sm" style="background:#fce4ec;color:#c62828;border-color:#f48fb1;" onclick="removeCProc('${cp.id}')">移除</button>`
          :`<button class="btn-sm" onclick="addCProc('${cp.id}')">+ 添加</button>`}
    </div>`;
  }).join('')||'<div class="empty">无匹配工艺</div>';
}
function addCProc(id){
  if(addedCProcs.find(a=>a.cprocId===id))return;
  // default: all parts selected
  const defaultParts=parts.map((_,i)=>i);
  addedCProcs.push({cprocId:id,selectedParts:defaultParts,params:{}});
  renderCProcLib(comboProcs);renderAddedCProcs();
  document.getElementById('cprocCnt').textContent=addedCProcs.length;
}
function removeCProc(id){
  const idx=addedCProcs.findIndex(a=>a.cprocId===id);
  if(idx>-1)addedCProcs.splice(idx,1);
  renderCProcLib(comboProcs);renderAddedCProcs();
  document.getElementById('cprocCnt').textContent=addedCProcs.length;
}
function renderAddedCProcs(){
  document.getElementById('cprocCnt').textContent=addedCProcs.length;
  const el=document.getElementById('addedCProcs');
  if(!addedCProcs.length){
    el.innerHTML=`<div class="empty"><i class="ti ti-tool" style="font-size:24px;display:block;margin-bottom:6px;" aria-hidden="true"></i>从左侧选择组合工艺<br/><span style="font-size:11px;">可选择铆接、焊接等跨配件工艺</span></div>`;
    return;
  }
  el.innerHTML=addedCProcs.map((a,ai)=>{
    const cp=comboProcs.find(c=>c.id===a.cprocId);
    if(!cp)return'';
    // part chips selection
    const partChips=parts.map((p,pi)=>{
      const sel=a.selectedParts.includes(pi);
      return `<span class="part-chip" style="cursor:pointer;${sel?'':'opacity:0.4;'}" onclick="toggleCProcPart(${ai},${pi})">${sel?'✓ ':''}${p.name}</span>`;
    }).join('');
    // param inputs
    const paramInputs=cp.params.map(pm=>`
      <div class="param-field" style="flex:1;min-width:100px;">
        <label>${pm.label}</label>
        <input type="${pm.type}" placeholder="${pm.placeholder}" value="${a.params[pm.id]||''}" 
          onchange="setCProcParam(${ai},'${pm.id}',this.value)" />
      </div>`).join('');
    return `<div class="added-cproc">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:16px;">${cp.icon}</span>
          <span style="font-size:12px;font-weight:500;color:#333;">${cp.name}</span>
        </div>
        <button class="btn-del" onclick="removeCProc('${cp.id}')" aria-label="移除">✕</button>
      </div>
      <div style="margin-bottom:8px;">
        <div style="font-size:11px;color:#888;margin-bottom:5px;">参与配件（点击切换）</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">${partChips}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">${paramInputs}</div>
    </div>`;
  }).join('');
}
function toggleCProcPart(ai,pi){
  const a=addedCProcs[ai];
  const idx=a.selectedParts.indexOf(pi);
  if(idx>-1){if(a.selectedParts.length<=2)return;a.selectedParts.splice(idx,1);}
  else a.selectedParts.push(pi);
  renderAddedCProcs();
}
function setCProcParam(ai,key,val){addedCProcs[ai].params[key]=val;}

// ── SUMMARY ──
function renderSummary(){
  document.getElementById('s0').innerHTML=`<div style="display:flex;align-items:center;gap:8px;font-size:13px;"><span style="font-size:20px;">${productType==='combo'?'🔧':'🔩'}</span><span style="font-weight:500;color:#333;">${productType==='combo'?'组合产品':'独立产品'}</span><span style="font-size:11px;color:#888;">${productType==='combo'?`共 ${parts.length} 个配件`:'单一零件'}</span></div>`;
  let html='';
  parts.forEach((p,i)=>{
    const pnTxt=p.pn?`<span style="color:#5c6bc0;font-weight:500;">${p.pn.pn}</span> · ${p.pn.spec} ${p.pn.dim}`:`<span style="color:#888;font-style:italic;">自定义选配</span>`;
    const matTxt=p.mat?`${p.mat.sym} ${p.mat.name} · ${p.mat.spec}`:'—';
    const procTxt=p.procs.length?p.procs.map(pr=>pr.name).join(' → '):'—';
    html+=`<div style="border:0.5px solid #e8e8e8;border-radius:8px;padding:10px 14px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:#333;margin-bottom:7px;">
        <span style="width:20px;height:20px;border-radius:50%;background:#5c6bc0;color:#fff;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</span>${p.name}</div>
      <div style="display:grid;grid-template-columns:48px 1fr;gap:4px 8px;font-size:12px;">
        <span style="color:#888;">料号</span><span>${pnTxt}</span>
        <span style="color:#888;">材质</span><span style="color:#555;">${matTxt}</span>
        <span style="color:#888;">工序</span><span style="color:#555;">${procTxt}</span>
      </div></div>`;
  });
  document.getElementById('s1').innerHTML=html;
  if(productType==='combo'){
    document.getElementById('s_combo_wrap').style.display='block';
    if(addedCProcs.length){
      document.getElementById('s2').innerHTML=addedCProcs.map(a=>{
        const cp=comboProcs.find(c=>c.id===a.cprocId);
        const partNames=a.selectedParts.map(i=>parts[i]?.name||'').join(' + ');
        const paramStr=Object.entries(a.params).map(([k,v])=>{const pm=cp.params.find(p=>p.id===k);return pm?`${pm.label}: ${v}`:''}).filter(Boolean).join('；');
        return `<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:0.5px solid #f0f0f0;">
          <span style="font-size:16px;flex-shrink:0;">${cp.icon}</span>
          <div><div style="font-size:12px;font-weight:500;color:#333;margin-bottom:2px;">${cp.name}</div>
          <div style="font-size:11px;color:#888;">${partNames}</div>
          ${paramStr?`<div style="font-size:11px;color:#aaa;margin-top:2px;">${paramStr}</div>`:''}
          </div></div>`;
      }).join('');
    } else {
      document.getElementById('s2').innerHTML='<div style="font-size:12px;color:#bbb;">未选择组合工艺</div>';
    }
  } else {
    document.getElementById('s_combo_wrap').style.display='none';
  }
}

// ── NAV ──
function updateNextBtn(){
  const p=parts[ci];
  let ok=true;
  if(globalStep===1&&subStep===0)ok=!!(p.pn||p.useNone);
  const btn=document.getElementById('btnNext');
  btn.style.opacity=ok?'1':'0.45';btn.style.pointerEvents=ok?'auto':'none';
}

function goNext(){
  if(globalStep===0){
    const count=productType==='combo'?initPartCount:1;
    parts=Array.from({length:count},(_,i)=>newPart(productType==='combo'?`配件 ${i+1}`:'产品'));
    ci=0;subStep=0;globalStep=1;loadWS();
    document.getElementById('mainSearch').value='';
    document.getElementById('pnResults').innerHTML='<div class="empty"><i class="ti ti-search" style="font-size:26px;display:block;margin-bottom:8px;" aria-hidden="true"></i>输入关键词开始搜索</div>';
    document.getElementById('matchCnt').textContent='—';
    renderPartProgress();showPanel('p1');
  } else if(globalStep===1){
    if(subStep===0){saveWS();subStep=1;initMatStep();renderPartProgress();showPanel('p2');}
    else if(subStep===1){saveWS();subStep=2;renderPartProgress();renderProcStep();showPanel('p3');}
    else if(subStep===2){
      saveWS();
      if(ci<parts.length-1){
        ci++;subStep=0;loadWS();
        document.getElementById('mainSearch').value='';
        document.getElementById('pnResults').innerHTML='<div class="empty"><i class="ti ti-search" style="font-size:26px;display:block;margin-bottom:8px;" aria-hidden="true"></i>输入关键词开始搜索</div>';
        document.getElementById('matchCnt').textContent='—';
        renderPartProgress();showPanel('p1');
      } else {
        if(productType==='combo'){
          globalStep=2;document.getElementById('partProgressWrap').style.display='none';
          initComboProcStep();showPanel('p4');
        } else {
          globalStep=3;renderSummary();showPanel('p5');
        }
      }
    }
  } else if(globalStep===2){globalStep=3;renderSummary();showPanel('p5');}
  else{document.getElementById('drw').style.display='none';return;}
  updateUI();
}

function goBack(){
  if(globalStep===1){
    if(subStep===2){subStep=1;initMatStep();renderPartProgress();showPanel('p2');}
    else if(subStep===1){subStep=0;document.getElementById('mainSearch').value='';document.getElementById('pnResults').innerHTML='<div class="empty"><i class="ti ti-search" style="font-size:26px;display:block;margin-bottom:8px;" aria-hidden="true"></i>输入关键词开始搜索</div>';document.getElementById('matchCnt').textContent='—';renderPartProgress();showPanel('p1');}
    else if(subStep===0&&ci>0){ci--;subStep=2;loadWS();renderPartProgress();renderProcStep();showPanel('p3');}
    else{globalStep=0;document.getElementById('partProgressWrap').style.display='none';showPanel('p0');}
  } else if(globalStep===2){
    globalStep=1;ci=parts.length-1;subStep=2;loadWS();
    renderPartProgress();document.getElementById('partProgressWrap').style.display='block';
    renderProcStep();showPanel('p3');
  } else if(globalStep===3){
    if(productType==='combo'){globalStep=2;initComboProcStep();showPanel('p4');}
    else{globalStep=1;subStep=2;ci=0;loadWS();renderPartProgress();renderProcStep();showPanel('p3');}
  }
  updateUI();
}

function updateUI(){
  document.getElementById('btnBack').style.display=globalStep>0?'':'none';
  let nextLabel='下一步';
  if(globalStep===1&&subStep===2){nextLabel=ci<parts.length-1?`下一配件（${parts[ci+1].name}）`:(productType==='combo'?'进入组合工艺':'查看汇总');}
  if(globalStep===2)nextLabel='完成选配';
  if(globalStep===3)nextLabel='确认添加';
  document.getElementById('btnNext').textContent=nextLabel;
  const partName=parts[ci]?parts[ci].name:'';
  const hints={
    '0':'选择独立产品或组合产品，组合产品可设置配件数量',
    '1_0':productType==='combo'?`正在配置「${partName}」（${ci+1}/${parts.length}）· 搜索料号`:'搜索并选择料号',
    '1_1':`「${partName}」· 确认材质成分`,
    '1_2':`「${partName}」· 选择工序（各配件独立）`,
    '2':'选择组合工艺，指定参与配件并填写工艺参数（如压力、电流等）',
    '3':'核对全部配件与组合工艺信息后确认添加',
  };
  const key=globalStep===0?'0':globalStep===1?`1_${subStep}`:String(globalStep);
  document.getElementById('footHint').textContent=hints[key]||'';
  renderGlobalBar();updateNextBtn();
}

updateUI();showPanel('p0');
</script>
