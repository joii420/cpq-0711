<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>3D 产品选配原型 v0.3 — 接触片配置器</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:#f0f2f5; font-size:13px; color:#303133; height:100vh; overflow:hidden; }

/* ============= 全屏布局 ============= */
.app { display:flex; flex-direction:column; height:100vh; }

/* 顶部条 60px */
.top-bar { height:60px; background:#fff; border-bottom:1px solid #e4e7ed; display:flex; align-items:center; padding:0 24px; gap:20px; box-shadow:0 2px 4px rgba(0,0,0,.04); z-index:10; }
.top-back { color:#606266; cursor:pointer; font-size:14px; display:inline-flex; align-items:center; gap:4px; }
.top-back:hover { color:#1890ff; }
.top-title { font-size:16px; font-weight:600; color:#303133; flex:1; }
.top-title .subtitle { font-size:12px; color:#909399; font-weight:normal; margin-left:8px; }
.top-actions { display:flex; gap:8px; }

/* 客户切换器 */
.customer-selector { display:flex; gap:6px; align-items:center; padding:0 10px; background:#fafbfc; border:1px solid #e4e7ed; border-radius:20px; }
.customer-selector .cs-label { font-size:11px; color:#909399; padding:6px 0; }
.cs-option { padding:5px 12px; font-size:12px; color:#606266; cursor:pointer; border-radius:14px; transition:all .2s; }
.cs-option:hover { background:#e6f4ff; color:#1890ff; }
.cs-option.active { background:#1890ff; color:#fff; font-weight:500; box-shadow:0 2px 4px rgba(24,144,255,.3); }
.cs-option.active.vip { background:linear-gradient(135deg,#faad14,#fa8c16); box-shadow:0 2px 6px rgba(250,173,20,.4); }
.cs-option.active.trial { background:#909399; }
.cs-tag { display:inline-block; padding:1px 5px; background:rgba(255,255,255,.25); border-radius:3px; font-size:9px; margin-left:4px; }

/* 分享对话框 */
.share-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:2500; }
.share-overlay.open { display:flex; }
.share-dialog { background:#fff; border-radius:12px; padding:24px 28px; max-width:560px; width:90%; box-shadow:0 12px 32px rgba(0,0,0,.2); }
.share-title { font-size:16px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.share-section { margin-top:14px; }
.share-section-label { font-size:12px; color:#606266; margin-bottom:6px; font-weight:500; }
.share-type-cards { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.share-type-card { padding:10px 12px; border:1px solid #e4e7ed; border-radius:6px; cursor:pointer; text-align:center; transition:all .2s; }
.share-type-card:hover { border-color:#91caff; background:#fafdff; }
.share-type-card.selected { border-color:#1890ff; background:#e6f4ff; box-shadow:0 0 0 2px rgba(24,144,255,.15); }
.share-type-card .icon { font-size:22px; margin-bottom:4px; }
.share-type-card .name { font-size:12.5px; font-weight:500; color:#303133; margin-bottom:2px; }
.share-type-card .desc { font-size:10.5px; color:#909399; line-height:1.4; }
.share-url-box { background:#f5f5f5; border:1px solid #e4e7ed; border-radius:6px; padding:10px 12px; font-family:Consolas,Monaco,monospace; font-size:11.5px; color:#606266; word-break:break-all; margin-bottom:10px; }
.share-form-row { margin-bottom:10px; }
.share-form-row label { font-size:12px; color:#606266; display:block; margin-bottom:4px; }
.share-form-row input { width:100%; padding:6px 10px; border:1px solid #dcdfe6; border-radius:4px; font-size:12.5px; }
.share-form-row input:focus { border-color:#1890ff; outline:none; box-shadow:0 0 0 2px rgba(24,144,255,.1); }
.share-form-row .row-flex { display:flex; gap:8px; align-items:center; }
.share-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; }

/* 价格倍率标签（VIP 折扣等） */
.price-multiplier-tag { display:inline-block; padding:2px 8px; background:linear-gradient(135deg,#faad14,#fa8c16); color:#fff; border-radius:3px; font-size:11px; font-weight:500; margin-left:6px; }
.price-multiplier-tag.trial { background:#909399; }

.btn { padding:6px 14px; border:1px solid #dcdfe6; background:#fff; border-radius:4px; cursor:pointer; font-size:12.5px; color:#606266; display:inline-flex; align-items:center; gap:4px; transition:all .2s; }
.btn:hover { color:#409eff; border-color:#c6e2ff; background:#ecf5ff; }
.btn-primary { background:#1890ff; color:#fff; border-color:#1890ff; }
.btn-primary:hover { background:#40a9ff; color:#fff; border-color:#40a9ff; }
.btn-success { background:linear-gradient(135deg,#52c41a,#13c2c2); color:#fff; border-color:transparent; box-shadow:0 2px 8px rgba(82,196,26,.3); padding:8px 18px; font-size:13px; font-weight:500; }
.btn-success:hover { box-shadow:0 4px 12px rgba(82,196,26,.4); transform:translateY(-1px); }
.btn-success:disabled, .btn-success.disabled { background:#e4e7ed; box-shadow:none; cursor:not-allowed; transform:none; }

/* 主内容（中间区域） */
.main { flex:1; display:flex; overflow:hidden; }

/* 左侧 3D 画布区 */
.canvas-section { flex:1; background:linear-gradient(135deg,#f5f7fa,#e4e7ed); position:relative; overflow:hidden; min-width:0; }
#configCanvas { width:100%; height:100%; display:block; outline:none; touch-action:none; }

.canvas-toolbar { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); background:rgba(0,21,41,.85); border-radius:8px; padding:6px 8px; display:flex; gap:4px; z-index:5; backdrop-filter:blur(8px); }
.canvas-toolbar button { padding:6px 10px; border:none; background:transparent; color:#fff; cursor:pointer; font-size:13px; border-radius:4px; transition:all .2s; }
.canvas-toolbar button:hover { background:rgba(255,255,255,.1); }
.canvas-toolbar button.active { background:#1890ff; }

.canvas-tip { position:absolute; top:16px; left:16px; background:rgba(0,21,41,.85); color:#fff; padding:6px 12px; border-radius:4px; font-size:11.5px; z-index:5; backdrop-filter:blur(8px); }

/* 进度浮层 */
.progress-overlay { position:absolute; top:16px; right:16px; background:rgba(255,255,255,.92); border-radius:8px; padding:10px 14px; box-shadow:0 2px 8px rgba(0,0,0,.08); backdrop-filter:blur(8px); z-index:5; min-width:200px; }
.progress-label { font-size:11.5px; color:#909399; margin-bottom:4px; }
.progress-label b { color:#1890ff; font-size:14px; }
.progress-bar { height:6px; background:#e4e7ed; border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#1890ff,#13c2c2); transition:width .3s; }

/* 右侧选项面板 */
.option-panel { width:400px; background:#fff; border-left:1px solid #e4e7ed; overflow-y:auto; flex-shrink:0; }
.option-header { padding:16px 20px; border-bottom:1px solid #f0f0f0; }
.option-header h2 { font-size:15px; font-weight:600; color:#303133; }
.option-header .hint { font-size:11.5px; color:#909399; margin-top:3px; }

/* Accordion */
.option-group { border-bottom:1px solid #f0f0f0; }
.option-group-header { padding:14px 20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; transition:background .2s; }
.option-group-header:hover { background:#fafbfc; }
.option-group-header.completed { background:linear-gradient(90deg,#f6ffed,#fff); }
.option-group-title { font-size:13.5px; font-weight:600; color:#303133; display:flex; align-items:center; gap:8px; }
.option-group-required { color:#f56c6c; font-size:11px; margin-left:2px; }
.option-group-check { width:18px; height:18px; border-radius:50%; background:#52c41a; color:#fff; font-size:11px; display:none; align-items:center; justify-content:center; }
.option-group-header.completed .option-group-check { display:flex; }
.option-group-arrow { font-size:10px; color:#909399; transition:transform .2s; }
.option-group.collapsed .option-group-arrow { transform:rotate(-90deg); }
.option-group-body { padding:8px 20px 16px; }
.option-group.collapsed .option-group-body { display:none; }

/* 选项卡片网格 */
.option-cards { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.option-cards.single-col { grid-template-columns:1fr; }
.option-card { border:1px solid #e4e7ed; border-radius:6px; padding:10px 12px; cursor:pointer; transition:all .2s; position:relative; background:#fff; }
.option-card:hover { border-color:#91caff; background:#fafdff; box-shadow:0 2px 6px rgba(24,144,255,.1); transform:translateY(-1px); }
.option-card.selected { border-color:#1890ff; background:#e6f4ff; box-shadow:0 0 0 2px rgba(24,144,255,.15); }
.option-card.selected::after { content:'✓'; position:absolute; top:6px; right:8px; color:#52c41a; font-weight:bold; font-size:14px; }
.option-card.disabled { opacity:.45; cursor:not-allowed; }
.option-card.disabled:hover { transform:none; box-shadow:none; border-color:#e4e7ed; background:#fff; }
.option-card-title { font-size:12.5px; font-weight:500; color:#303133; margin-bottom:4px; }
.option-card-desc { font-size:11px; color:#909399; margin-bottom:6px; line-height:1.4; }
.option-card-price { font-size:11.5px; color:#1890ff; font-weight:500; }
.option-card-price.neutral { color:#909399; }
.option-card-price.delta-positive::before { content:'+'; }

/* 色卡（颜色选项） */
.color-card { display:flex; align-items:center; gap:8px; padding:8px 10px; }
.color-swatch { width:24px; height:24px; border-radius:4px; border:1px solid rgba(0,0,0,.1); flex-shrink:0; }

/* 多选 checkbox 卡片 */
.option-card.multi-select { padding-right:32px; }
.option-card.multi-select.selected::after { content:''; }
.option-card.multi-select .check-box { position:absolute; top:50%; right:10px; transform:translateY(-50%); width:18px; height:18px; border:1px solid #dcdfe6; border-radius:3px; display:flex; align-items:center; justify-content:center; }
.option-card.multi-select.selected .check-box { background:#1890ff; border-color:#1890ff; color:#fff; font-size:12px; }
.option-card.multi-select.selected .check-box::after { content:'✓'; }

/* 底部价格条 */
.footer-bar { height:90px; background:#fff; border-top:1px solid #e4e7ed; padding:14px 24px; box-shadow:0 -2px 8px rgba(0,0,0,.04); z-index:10; display:flex; align-items:center; gap:24px; }

.config-summary { flex:1; min-width:0; }
.config-summary-label { font-size:11.5px; color:#909399; margin-bottom:3px; }
.config-summary-text { font-size:13px; color:#303133; font-weight:500; }
.config-summary-text .tag { display:inline-block; padding:1px 8px; background:#e6f4ff; color:#0958d9; border:1px solid #91caff; border-radius:3px; font-size:11px; margin-right:4px; }

.price-display { text-align:right; min-width:240px; }
.price-breakdown { font-size:11.5px; color:#909399; line-height:1.4; max-height:32px; overflow:hidden; }
.price-total { font-size:22px; font-weight:600; color:#c41d7f; margin-top:2px; }
.price-total .currency { font-size:14px; color:#909399; font-weight:normal; }

.footer-actions { display:flex; gap:8px; align-items:center; }

/* Toast */
.toast-stack { position:fixed; top:80px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.toast { background:#fff; border:1px solid #b7eb8f; border-left:4px solid #52c41a; padding:10px 14px; border-radius:4px; box-shadow:0 4px 12px rgba(0,0,0,.1); font-size:12.5px; min-width:280px; max-width:380px; animation:slideIn .3s ease; pointer-events:auto; }
.toast.info { border-color:#91caff; border-left-color:#1890ff; }
.toast.warning { border-color:#ffd591; border-left-color:#faad14; }
.toast.error { border-color:#fbc4c4; border-left-color:#f56c6c; }
@keyframes slideIn { from { transform:translateX(120%); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* 演示快捷面板 */
.demo-presets { position:fixed; bottom:100px; left:24px; background:rgba(0,21,41,.92); color:#fff; padding:12px 14px; border-radius:6px; font-size:11.5px; z-index:500; box-shadow:0 4px 12px rgba(0,0,0,.3); }
.demo-presets h4 { font-size:12px; margin-bottom:8px; color:#69c0ff; }
.demo-presets button { padding:5px 10px; border:1px solid #1f2d3d; background:#000c17; color:#a6adb4; border-radius:3px; cursor:pointer; font-size:11px; margin:2px; }
.demo-presets button:hover { background:#1f2d3d; color:#fff; }

/* 提交对话框 — v0.4 P0 改造：两步式（建实例 + 三选一动作） */
.submit-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:2500; }
.submit-overlay.open { display:flex; }
.submit-dialog { background:#fff; border-radius:12px; padding:24px 30px; max-width:600px; width:90%; box-shadow:0 12px 32px rgba(0,0,0,.2); max-height:90vh; overflow-y:auto; }
.submit-icon { width:56px; height:56px; margin:0 auto 12px; background:linear-gradient(135deg,#52c41a,#13c2c2); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:28px; }
.submit-title { text-align:center; font-size:18px; font-weight:600; margin-bottom:6px; }
.submit-desc { text-align:center; font-size:12.5px; color:#606266; margin-bottom:14px; line-height:1.6; }
.submit-detail { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:10px 14px; font-size:12px; color:#389e0d; margin-bottom:14px; font-family:Consolas,Monaco,monospace; line-height:1.7; }

/* 三选一动作卡片 */
.action-cards { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
.action-card { border:1.5px solid #e4e7ed; border-radius:8px; padding:12px 14px; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:12px; }
.action-card:hover { border-color:#1890ff; background:#fafdff; transform:translateX(2px); }
.action-card.primary { border-color:#52c41a; background:linear-gradient(135deg,#f6ffed,#fff); }
.action-card.primary:hover { border-color:#389e0d; box-shadow:0 4px 12px rgba(82,196,26,.15); }
.action-icon-large { font-size:28px; width:42px; text-align:center; flex-shrink:0; }
.action-info { flex:1; }
.action-card-title { font-size:13.5px; font-weight:600; color:#303133; margin-bottom:3px; }
.action-card-desc { font-size:11.5px; color:#606266; line-height:1.5; }
.action-card-arrow { color:#bfbfbf; font-size:16px; }
.action-card:hover .action-card-arrow { color:#1890ff; }
.action-card.primary .action-card-arrow { color:#52c41a; }

/* 已有报价单列表 - 步骤 2.3 弹出 */
.existing-quote-list { max-height:240px; overflow-y:auto; border:1px solid #e4e7ed; border-radius:6px; margin-bottom:14px; }
.existing-quote-row { padding:10px 12px; border-bottom:1px solid #f0f0f0; cursor:pointer; display:flex; gap:10px; align-items:center; }
.existing-quote-row:last-child { border-bottom:none; }
.existing-quote-row:hover { background:#fafdff; }
.existing-quote-row.selected { background:#e6f7ff; border-left:3px solid #1890ff; padding-left:9px; }
.existing-quote-info { flex:1; }
.eq-no { font-family:Consolas,Monaco,monospace; font-size:12px; color:#1890ff; font-weight:500; }
.eq-meta { font-size:11px; color:#909399; margin-top:2px; }
.eq-amt { font-weight:600; color:#cf1322; font-size:13px; }
</style>
</head>
<body>

<div class="app">
  <!-- 顶部条 -->
  <div class="top-bar">
    <span class="top-back" onclick="showToast('info','演示版：返回 /products 列表页')">← 返回</span>
    <div class="top-title">
      接触片产品选配
      <span class="subtitle">CFG-TPL-CONTACT-STRIP · v0.4 实验性</span>
    </div>

    <!-- 多租户客户切换器 (v0.4 §十四) -->
    <div class="customer-selector">
      <span class="cs-label">客户视角:</span>
      <span class="cs-option active vip" data-customer="rockwell" onclick="switchCustomer('rockwell')">罗克韦尔 <span class="cs-tag">VIP</span></span>
      <span class="cs-option" data-customer="siemens" onclick="switchCustomer('siemens')">西门子 <span class="cs-tag">STD</span></span>
      <span class="cs-option" data-customer="trial" onclick="switchCustomer('trial')">新客户 <span class="cs-tag">TRIAL</span></span>
    </div>

    <div class="top-actions">
      <label style="display:inline-flex;align-items:center;gap:6px;padding:0 10px;font-size:12px;color:#606266;cursor:pointer;border:1px dashed #faad14;border-radius:4px;background:#fffbe6;" title="模拟 product_config_template.show_price 配置">
        <input type="checkbox" id="hidePriceToggle" onchange="togglePriceDisplay(this.checked)" />
        <span>🎭 隐藏价格 (演示)</span>
      </label>
      <button class="btn" onclick="saveDraft()">💾 保存草稿</button>
      <button class="btn" onclick="openShareDialog()">🔗 分享配置</button>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main">
    <!-- 左侧：3D 画布 -->
    <div class="canvas-section">
      <canvas id="configCanvas"></canvas>

      <div class="canvas-tip">
        💡 拖拽旋转 · 滚轮缩放 · 选项变化即时联动
      </div>

      <div class="progress-overlay">
        <div class="progress-label">配置进度: <b id="progressPct">0%</b> · <span id="progressLabel">0 / 4 必选项</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>

      <div class="canvas-toolbar">
        <button onclick="resetCamera()" title="重置视角">🔄</button>
        <button onclick="cycleViewAngle()" title="切换视角">👁</button>
        <button onclick="toggleWireframe()" id="btnWire" title="线框模式">📐</button>
        <button onclick="takeScreenshot()" title="截图">💾</button>
      </div>
    </div>

    <!-- 右侧：选项面板 -->
    <div class="option-panel" id="optionPanel">
      <div class="option-header">
        <h2>📋 配置选项</h2>
        <div class="hint">选项变化时左侧 3D 自动联动，价格实时更新</div>
      </div>

      <!-- Accordion 由 JS 动态渲染 -->
      <div id="optionGroups"></div>
    </div>
  </div>

  <!-- 底部价格条 -->
  <div class="footer-bar">
    <div class="config-summary">
      <div class="config-summary-label">当前配置</div>
      <div class="config-summary-text" id="summaryText">请先完成必选项 ↑</div>
    </div>
    <div class="price-display">
      <div class="price-breakdown" id="priceBreakdown">基础价 ¥0</div>
      <div class="price-total"><span class="currency">¥</span><span id="totalPrice">0</span></div>
    </div>
    <div class="footer-actions">
      <button class="btn" onclick="quickEstimate()">💰 估价对照</button>
      <button class="btn-success disabled" id="submitBtn" onclick="submitConfig()" disabled>🎯 生成报价单 →</button>
    </div>
  </div>
</div>

<!-- 演示快捷预设 -->
<div class="demo-presets">
  <h4>🧪 演示预设</h4>
  <button onclick="applyPreset('standard')">标准款套装</button>
  <button onclick="applyPreset('enhanced')">增强款套装</button>
  <button onclick="applyPreset('premium')">高端款套装</button>
  <br/>
  <button onclick="resetConfig()" style="margin-top:6px;">重置配置</button>
</div>

<!-- Toast -->
<div class="toast-stack" id="toastStack"></div>

<!-- 分享对话框 (v0.4 §十七) -->
<div class="share-overlay" id="shareOverlay">
  <div class="share-dialog">
    <div class="share-title">🔗 分享配置</div>
    <div style="font-size:12.5px;color:#909399;margin-bottom:14px;">将当前配置分享给他人 — 选择分享类型：</div>

    <div class="share-type-cards">
      <div class="share-type-card selected" data-share-type="CUSTOMER_SELF" onclick="selectShareType('CUSTOMER_SELF')">
        <div class="icon">👥</div>
        <div class="name">客户自助</div>
        <div class="desc">发链接给客户自己查看修改</div>
      </div>
      <div class="share-type-card" data-share-type="INTERNAL" onclick="selectShareType('INTERNAL')">
        <div class="icon">🏢</div>
        <div class="name">内部分享</div>
        <div class="desc">销售之间分享方案参考</div>
      </div>
      <div class="share-type-card" data-share-type="PUBLIC_PRESET" onclick="selectShareType('PUBLIC_PRESET')">
        <div class="icon">📚</div>
        <div class="name">存为模板</div>
        <div class="desc">公共模板库供他人复用</div>
      </div>
    </div>

    <div class="share-section">
      <div class="share-section-label">分享 URL（点击复制）：</div>
      <div class="share-url-box" id="shareUrlBox" onclick="copyShareUrl()" title="点击复制"></div>
    </div>

    <div class="share-section" id="customerFormSection">
      <div class="share-form-row">
        <label>客户邮箱（发送给）</label>
        <input type="email" id="customerEmail" placeholder="example@customer.com" />
      </div>
      <div class="share-form-row row-flex">
        <input type="checkbox" id="canModify" checked /> <label for="canModify" style="margin:0;cursor:pointer;">允许客户修改配置</label>
      </div>
      <div class="share-form-row">

// ============================================================
// 选项面板渲染
// ============================================================
function renderOptionPanel() {
  const container = document.getElementById('optionGroups');
  container.innerHTML = configTemplate.options.map(opt => {
    const isCompleted = isOptionCompleted(opt);
    return `
      <div class="option-group ${isCompleted ? '' : 'collapsed-default'}" data-opt-code="${opt.code}">
        <div class="option-group-header ${isCompleted ? 'completed' : ''}" onclick="toggleGroup('${opt.code}')">
          <div class="option-group-title">
            ${opt.label}${opt.required ? '<span class="option-group-required">*</span>' : ''}
            <span class="option-group-check">✓</span>
          </div>
          <span class="option-group-arrow">▼</span>
        </div>
        <div class="option-group-body">
          <div class="option-cards ${opt.type === 'MULTI_SELECT' ? 'single-col' : ''}">
            ${opt.values.map(val => renderValueCard(opt, val)).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderValueCard(opt, val) {
  const isSelected = isValueSelected(opt.code, val.code);
  const cardClass = `option-card ${isSelected ? 'selected' : ''} ${opt.type === 'MULTI_SELECT' ? 'multi-select' : ''}`;
  const priceText = val.priceDelta === 0
    ? (opt.required ? '<span class="option-card-price neutral">标配</span>' : '<span class="option-card-price neutral">¥0</span>')
    : `<span class="option-card-price delta-positive">¥${val.priceDelta}</span>`;
  return `
    <div class="${cardClass}"
         data-value-code="${val.code}"
         onclick="selectValue('${opt.code}','${val.code}', '${opt.type}')"
         onmouseenter="previewValue('${opt.code}','${val.code}')"
         onmouseleave="endPreview()">
      ${opt.type === 'MULTI_SELECT' ? '<div class="check-box"></div>' : ''}
      <div class="option-card-title">${val.label}</div>
      <div class="option-card-desc">${val.desc}</div>
      ${priceText}
    </div>
  `;
}

function toggleGroup(optCode) {
  const grp = document.querySelector(`.option-group[data-opt-code="${optCode}"]`);
  if (grp) grp.classList.toggle('collapsed');
}

function isValueSelected(optCode, valCode) {
  const v = selectedValues[optCode];
  if (Array.isArray(v)) return v.includes(valCode);
  return v === valCode;
}

function isOptionCompleted(opt) {
  const v = selectedValues[opt.code];
  if (opt.required) {
    if (Array.isArray(v)) return v.length > 0;
    return v != null && v !== '';
  }
  return true;
}

// ============================================================
// 选项交互
// ============================================================
function selectValue(optCode, valCode, optType) {
  if (optType === 'MULTI_SELECT') {
    if (!selectedValues[optCode]) selectedValues[optCode] = [];
    const idx = selectedValues[optCode].indexOf(valCode);
    if (idx >= 0) selectedValues[optCode].splice(idx, 1);
    else selectedValues[optCode].push(valCode);
  } else {
    selectedValues[optCode] = valCode;
  }
  evaluate();
  renderOptionPanel();
}

let previewSnapshot = null;
function previewValue(optCode, valCode) {
  if (!engine) return;
  // 临时应用该值的 3D 规则，鼠标离开恢复
  const opt = configTemplate.options.find(o => o.code === optCode);
  const val = opt && opt.values.find(v => v.code === valCode);
  if (!val || !val.rules) return;
  hoverValueCode = valCode;
  // 保存当前状态
  if (!previewSnapshot) previewSnapshot = captureMeshState();
  val.rules.forEach(applyRule);
}

function endPreview() {
  if (previewSnapshot) {
    restoreMeshState(previewSnapshot);
    previewSnapshot = null;
  }
  hoverValueCode = null;
  // 恢复正式 selectedValues 的 3D 状态
  apply3DCommands(computeRender3DCommands());
}

// ============================================================
// 核心 evaluate：选项变化时执行
// ============================================================
function evaluate() {
  // 1. 计算价格
  let total = configTemplate.basePrice;
  const breakdown = [`基础 ¥${configTemplate.basePrice}`];
  const summaryParts = [];

  configTemplate.options.forEach(opt => {
    const v = selectedValues[opt.code];
    if (!v) return;
    if (Array.isArray(v)) {
      v.forEach(vc => {
        const val = opt.values.find(x => x.code === vc);
        if (val) {
          total += val.priceDelta;
          if (val.priceDelta > 0) breakdown.push(`${val.label} +¥${val.priceDelta}`);
          summaryParts.push(val.label);
        }
      });
    } else {
      const val = opt.values.find(x => x.code === v);
      if (val) {
        total += val.priceDelta;
        if (val.priceDelta > 0) breakdown.push(`${val.label} +¥${val.priceDelta}`);
        summaryParts.push(val.label);
      }
    }
  });

  // 2. 检查约束
  let conflictMsg = null;
  for (const c of configTemplate.constraints) {
    const triggerMatch = Object.entries(c.trigger).every(([k,v]) =>
      selectedValues[k.replace(/_/g,'-')] === v ||
      (Array.isArray(selectedValues[k.replace(/_/g,'-')]) && selectedValues[k.replace(/_/g,'-')].includes(v))
    );
    if (triggerMatch) {
      if (c.type === 'EXCLUDES') {
        const affectedKey = Object.keys(c.affected)[0].replace(/_/g,'-');
        const affectedVal = c.affected[Object.keys(c.affected)[0]];
        if (selectedValues[affectedKey] === affectedVal) {
          conflictMsg = c.message;
          showToast('warning', `⚠️ ${c.message}`);
        }
      } else if (c.type === 'IMPLIES') {
        const affectedKey = Object.keys(c.affected)[0].replace(/_/g,'-');
        const affectedVal = c.affected[Object.keys(c.affected)[0]];
        if (!selectedValues[affectedKey] || (Array.isArray(selectedValues[affectedKey]) && !selectedValues[affectedKey].includes(affectedVal))) {
          if (Array.isArray(selectedValues[affectedKey])) {
            selectedValues[affectedKey].push(affectedVal);
          } else if (!selectedValues[affectedKey]) {
            selectedValues[affectedKey] = [affectedVal];
          }
          showToast('info', `ℹ ${c.message}`);
        }
      }
    }
  }

  // 3. 应用 3D 渲染
  apply3DCommands(computeRender3DCommands());

  // 4. 更新底部 UI
  document.getElementById('priceBreakdown').textContent = breakdown.join(' + ');
  document.getElementById('totalPrice').textContent = total.toLocaleString();
  const summaryEl = document.getElementById('summaryText');
  if (summaryParts.length === 0) {
    summaryEl.textContent = '请先完成必选项 ↑';
  } else {
    summaryEl.innerHTML = summaryParts.map(s => `<span class="tag">${s}</span>`).join('');
  }

  // 5. 更新进度
  const required = configTemplate.options.filter(o => o.required);
  const filled = required.filter(isOptionCompleted).length;
  const pct = required.length === 0 ? 100 : Math.round((filled / required.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = `${filled} / ${required.length} 必选项`;
  document.getElementById('progressFill').style.width = pct + '%';

  // 6. 提交按钮状态
  const submitBtn = document.getElementById('submitBtn');
  if (pct === 100) {
    submitBtn.classList.remove('disabled');
    submitBtn.disabled = false;
  } else {
    submitBtn.classList.add('disabled');
    submitBtn.disabled = true;
  }
}

function computeRender3DCommands() {
  const commands = [];
  configTemplate.options.forEach(opt => {
    const v = selectedValues[opt.code];
    if (!v) return;
    if (Array.isArray(v)) {
      // 多选：选中的 push rules / 未选的 push inverseRules
      opt.values.forEach(val => {
        if (v.includes(val.code)) {
          (val.rules || []).forEach(r => commands.push(r));
        } else {
          (val.inverseRules || []).forEach(r => commands.push(r));
        }
      });
    } else {
      const val = opt.values.find(x => x.code === v);
      if (val && val.rules) val.rules.forEach(r => commands.push(r));
    }
  });
  return commands;
}

function apply3DCommands(commands) {
  if (!scene) return;
  commands.forEach(applyRule);
}

function applyRule(rule) {
  if (!scene) return;
  const mesh = meshRefs[rule.target];
  if (!mesh) return;
  switch (rule.action) {
    case 'SHOW_MESH':
      mesh.isVisible = true;
      mesh.setEnabled(true);
      break;
    case 'HIDE_MESH':
      mesh.isVisible = false;
      mesh.setEnabled(false);
      break;
    case 'REPLACE_MATERIAL':
      if (mesh.material && rule.params && rule.params.diffuse) {
        const c = hexToColor3(rule.params.diffuse);
        mesh.material.diffuseColor = c;
      }
      break;
    case 'TRANSFORM_MESH':
      if (rule.params) {
        if (rule.params.position) mesh.position = new BABYLON.Vector3(...rule.params.position);
        if (rule.params.rotation) mesh.rotation = new BABYLON.Vector3(...rule.params.rotation);
        if (rule.params.scaling)  mesh.scaling  = new BABYLON.Vector3(...rule.params.scaling);
      }
      break;
    // SWAP_MESH 略：演示版不实现
  }
}

function captureMeshState() {
  const snap = {};
  Object.entries(meshRefs).forEach(([name, mesh]) => {
    snap[name] = {
      visible: mesh.isVisible,
      enabled: mesh.isEnabled(),
      diffuse: mesh.material && mesh.material.diffuseColor ? mesh.material.diffuseColor.clone() : null,
    };
  });
  return snap;
}

function restoreMeshState(snap) {
  Object.entries(snap).forEach(([name, s]) => {
    const mesh = meshRefs[name];
    if (!mesh) return;
    mesh.isVisible = s.visible;
    mesh.setEnabled(s.enabled);
    if (s.diffuse && mesh.material) mesh.material.diffuseColor = s.diffuse;
  });
}

function hexToColor3(hex) {
  const r = parseInt(hex.substr(1,2),16) / 255;
  const g = parseInt(hex.substr(3,2),16) / 255;
  const b = parseInt(hex.substr(5,2),16) / 255;
  return new BABYLON.Color3(r, g, b);
}

// ============================================================
// Babylon 3D 场景
// ============================================================
function initBabylon() {
  const canvas = document.getElementById('configCanvas');
  engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, antialias: true });
  scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.96, 0.97, 0.98, 1);

  camera = new BABYLON.ArcRotateCamera('cam', Math.PI/4, Math.PI/3, 7, BABYLON.Vector3.Zero(), scene);
  camera.attachControl(canvas, true);
  camera.lowerRadiusLimit = 3;
  camera.upperRadiusLimit = 15;
  camera.wheelDeltaPercentage = 0.02;

  new BABYLON.HemisphericLight('hl', new BABYLON.Vector3(0,1,0), scene).intensity = 0.85;
  const dl = new BABYLON.DirectionalLight('dl', new BABYLON.Vector3(-1,-2,-1), scene);
  dl.intensity = 0.5;

  buildContactStrip(scene);

  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());
}

function buildContactStrip(scene) {
  // 主体 (始终显示) — 长方形片
  const main = BABYLON.MeshBuilder.CreateBox('mesh_main_body', { width: 3, height: 0.25, depth: 1.4 }, scene);
  main.position.y = 0;
  const matMain = new BABYLON.StandardMaterial('matMain', scene);
  matMain.diffuseColor = new BABYLON.Color3(0.6, 0.6, 0.65);
  matMain.specularPower = 32;
  main.material = matMain;
  meshRefs.mesh_main_body = main;

  // 接触层（材质显示）
  const contact = BABYLON.MeshBuilder.CreateBox('mesh_contact_layer', { width: 2.7, height: 0.06, depth: 1.15 }, scene);
  contact.position.y = 0.155;
  const matContact = new BABYLON.StandardMaterial('matContact', scene);
  matContact.diffuseColor = new BABYLON.Color3(0.8, 0.5, 0.2);
  matContact.specularPower = 64;
  contact.material = matContact;
  meshRefs.mesh_contact_layer = contact;

  // 镀层（默认隐藏）
  const coating = BABYLON.MeshBuilder.CreateBox('mesh_coating_layer', { width: 2.7, height: 0.03, depth: 1.15 }, scene);
  coating.position.y = 0.2;
  const matCoating = new BABYLON.StandardMaterial('matCoating', scene);
  matCoating.diffuseColor = new BABYLON.Color3(0.62, 0.62, 0.66);
  coating.material = matCoating;
  meshRefs.mesh_coating_layer = coating;
  coating.isVisible = false;
  coating.setEnabled(false);

  // 三种螺纹孔（互斥显示）
  const createThread = (name, diameter, posX) => {
    const t = BABYLON.MeshBuilder.CreateCylinder(name, { diameter, height: 0.5, tessellation: 16 }, scene);
    t.position = new BABYLON.Vector3(posX, 0, 0);
    const m = new BABYLON.StandardMaterial(name + '_mat', scene);
    m.diffuseColor = new BABYLON.Color3(0.3, 0.3, 0.35);
    t.material = m;
    meshRefs[name] = t;
    return t;
  };
  const m6 = createThread('mesh_thread_m6', 0.25, -1.2);
  const m8 = createThread('mesh_thread_m8', 0.35, -1.2);
  const m10 = createThread('mesh_thread_m10', 0.45, -1.2);
  const m6_r = createThread('mesh_thread_m6_r', 0.25, 1.2);  // 右侧第二孔
  meshRefs.mesh_thread_m6_r = m6_r;
  // 默认仅 M8 可见
  m6.isVisible = false; m6.setEnabled(false);
  m10.isVisible = false; m10.setEnabled(false);
  m6_r.isVisible = false; m6_r.setEnabled(false);

  // 焊接连接片（焊接连接时显示）
  const weld = BABYLON.MeshBuilder.CreateBox('mesh_weld_pad', { width: 0.6, height: 0.08, depth: 0.6 }, scene);
  weld.position = new BABYLON.Vector3(-1.2, 0.165, 0);
  const matWeld = new BABYLON.StandardMaterial('matWeld', scene);
  matWeld.diffuseColor = new BABYLON.Color3(1, 0.6, 0.2);
  matWeld.emissiveColor = new BABYLON.Color3(0.15, 0.1, 0.04);
  weld.material = matWeld;
  meshRefs.mesh_weld_pad = weld;
  weld.isVisible = false;

function resetCamera() {
  if (!camera) return;
  viewAngleIdx = 0;
  const a = viewAngles[0];
  BABYLON.Animation.CreateAndStartAnimation('a', camera, 'alpha', 30, 15, camera.alpha, a.alpha, 0);
  BABYLON.Animation.CreateAndStartAnimation('b', camera, 'beta', 30, 15, camera.beta, a.beta, 0);
  BABYLON.Animation.CreateAndStartAnimation('r', camera, 'radius', 30, 15, camera.radius, a.radius, 0);
}

function cycleViewAngle() {
  if (!camera) return;
  viewAngleIdx = (viewAngleIdx + 1) % viewAngles.length;
  const a = viewAngles[viewAngleIdx];
  BABYLON.Animation.CreateAndStartAnimation('a', camera, 'alpha', 30, 15, camera.alpha, a.alpha, 0);
  BABYLON.Animation.CreateAndStartAnimation('b', camera, 'beta', 30, 15, camera.beta, a.beta, 0);
  showToast('info', `视角: <b>${a.name}</b>`);
}

function toggleWireframe() {
  if (!scene) return;
  isWireframe = !isWireframe;
  scene.meshes.forEach(m => { if (m.material) m.material.wireframe = isWireframe; });
  document.getElementById('btnWire').classList.toggle('active', isWireframe);
}

function takeScreenshot() {
  if (!engine) return;
  BABYLON.Tools.CreateScreenshot(engine, camera, { width: 1280, height: 720 });

}

// 修改 evaluate 应用价格倍率（v0.4 §十四）
const origEvaluate = evaluate;
evaluate = function() {
  origEvaluate.apply(this, arguments);
  const profile = customerProfiles[currentCustomer];
  if (profile && profile.priceMultiplier !== 1.0) {
    const totalEl = document.getElementById('totalPrice');
    const baseTotal = parseFloat(totalEl.textContent.replace(/,/g,''));
    const adjusted = Math.round(baseTotal * profile.priceMultiplier);
    totalEl.textContent = adjusted.toLocaleString();
    // 在底部显示倍率标签
    const bd = document.getElementById('priceBreakdown');
    const ratioPct = Math.round((profile.priceMultiplier - 1) * 100);
    const ratioLabel = ratioPct < 0 ? `${ratioPct}% (VIP 优惠)` : (ratioPct > 0 ? `+${ratioPct}% (试用加价)` : '');
    if (ratioLabel) {
      bd.innerHTML += ` <span class="price-multiplier-tag ${currentCustomer==='trial'?'trial':''}">${ratioLabel}</span>`;
    }
  }
};

// 修改 renderValueCard 实现可见性过滤（v0.4 §十四）
const origRender = renderOptionPanel;
renderOptionPanel = function() {
  origRender.apply(this, arguments);
  const profile = customerProfiles[currentCustomer];
  if (profile && profile.visibleValueCodes) {
    document.querySelectorAll('.option-card').forEach(card => {
      const valueCode = card.dataset.valueCode;
      if (valueCode && !profile.visibleValueCodes.includes(valueCode)) {
        card.style.display = 'none';
      }
    });
  }
};

function submitConfig() {
  if (document.getElementById('submitBtn').disabled) return;

  // ===== 步骤 1：模拟 POST /configurator/instances → 生成 instance =====
  const fingerprint = btoa(JSON.stringify(selectedValues)).substring(0, 12);
  const now = new Date();
  const yyyymm = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0');
  // mock seq：使用 sessionStorage 持久递增
  let seq = parseInt(sessionStorage.getItem('cpqInstSeq')||'0') + 1;
  sessionStorage.setItem('cpqInstSeq', String(seq));
  const instanceCode = `CI-${yyyymm}-${String(seq).padStart(4,'0')}`;
  const totalPrice = document.getElementById('totalPrice').textContent;

  currentInstance = {
    instance_code: instanceCode,
    instance_id: 'uuid-' + Math.random().toString(36).substring(2,10),
    template_id: 'CFG-TPL-CONTACT-STRIP',
    customer_id: currentCustomer === 'rockwell' ? 'cus-rockwell-001' : (currentCustomer === 'siemens' ? 'cus-siemens-002' : 'cus-trial-099'),

    selected_values: { ...selectedValues },
    total_price: totalPrice,
    status: 'SUBMITTED',
    created_at: now.toISOString().slice(0,16).replace('T',' '),

  renderStep1();
  document.getElementById('submitOverlay').classList.add('open');
}

}

function showToast(level, html) {
  const stack = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = 'toast ' + level;
  t.innerHTML = html;
  stack.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity .3s, transform .3s';
    t.style.opacity = '0';
    t.style.transform = 'translateX(120%)';
    setTimeout(() => t.remove(), 350);
  }, 3500);
}

// ============================================================
// 初始化
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  initBabylon();
  // 应用默认值
  resetConfig();
});
</script>
